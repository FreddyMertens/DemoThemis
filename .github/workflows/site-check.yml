name: Unified site checks

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: DemoThemisMVP/web/pnpm-lock.yaml

      - name: Build deploy output
        run: node tools/build-site.js

      - name: Validate gamelab model
        run: node tools/validate-gamelab.js

      - name: Smoke test built site
        run: node tools/smoke-site.js

      - name: Install MVP dependencies
        working-directory: DemoThemisMVP/web
        run: pnpm install --frozen-lockfile

      - name: Build unified proposal and MVP
        working-directory: DemoThemisMVP/web
        run: node ../../tools/prepare-unified-site.js && pnpm build
