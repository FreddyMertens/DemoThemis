name: Contract checks

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  contracts:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: DemoThemisMVP/contracts
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Build contracts
        run: forge build --sizes
      - name: Test contracts
        run: forge test -vvv
