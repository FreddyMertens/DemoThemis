[build]
  base = "DemoThemisMVP/web"
  command = "node ../../tools/prepare-unified-site.js && pnpm build"
  # The build consumes proposal sources outside the detected web package, so every push must rebuild.
  ignore = "exit 1"
  publish = ".next"

[build.environment]
  NODE_VERSION = "24"

[[redirects]]
  from = "/"
  to = "/proposal-home.html"
  status = 200

[[redirects]]
  from = "/the-design"
  to = "/run-through.html"
  status = 301

[[redirects]]
  from = "/the-design.html"
  to = "/run-through.html"
  status = 301

[[redirects]]
  from = "/game-theory"
  to = "/break-the-court.html"
  status = 301

[[redirects]]
  from = "/game-theory.html"
  to = "/break-the-court.html"
  status = 301

[[redirects]]
  from = "/prediction-market"
  to = "/omenmarketmaker.html"
  status = 301

[[redirects]]
  from = "/prediction-market.html"
  to = "/omenmarketmaker.html"
  status = 301

[[redirects]]
  from = "/hybrid-juror-prediction-market-integration"
  to = "/bootstrap-loop.html"
  status = 301

[[redirects]]
  from = "/hybrid-juror-prediction-market-integration.html"
  to = "/bootstrap-loop.html"
  status = 301

[[redirects]]
  from = "/mvp"
  to = "/demothemis-mvp.html"
  status = 301

[[redirects]]
  from = "/mvp.html"
  to = "/demothemis-mvp.html"
  status = 301

[[redirects]]
  from = "/vision"
  to = "/demothemis.html"
  status = 301

[[redirects]]
  from = "/vision.html"
  to = "/demothemis.html"
  status = 301

[[redirects]]
  from = "/juror-court"
  to = "/demothemis.html"
  status = 301

[[redirects]]
  from = "/juror-court.html"
  to = "/demothemis.html"
  status = 301

[[redirects]]
  from = "/hybrid-juror-system"
  to = "/demothemis.html"
  status = 301

[[redirects]]
  from = "/hybrid-juror-system.html"
  to = "/demothemis.html"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/v/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'inline-speculation-rules' 'wasm-unsafe-eval'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[headers]]
  for = "/index.html"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'inline-speculation-rules' 'wasm-unsafe-eval'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[headers]]
  for = "/proposal-home*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' 'inline-speculation-rules' 'wasm-unsafe-eval'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"

