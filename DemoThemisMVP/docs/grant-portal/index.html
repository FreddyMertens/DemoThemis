# Independent review — weak spots & what's left

An adversarial, multi-agent audit of the project run on 2026-06-20 (25 agents across
contracts, web, tests, grant-claims, and repo hygiene; serious findings were
re-verified by independent skeptics). It is separate from the team's own
[GRANT_READINESS.md](GRANT_READINESS.md): the job here was to verify the claims and find
the weak spots the self-assessment missed.

> **2026-07-22 remediation note:** the source tree now fixes both liveness paths in
> finding A1. It checks the eligible pool after excluding case parties before accepting
> funds, assigns every accepted case an immutable one-hour first-draw deadline, and lets
> anyone unwind an undrawn case with the unused fee and escrow principal returned to the
> payer. Permit2 re-bond, a separate fixed retry deadline, and permissionless status-quo
> finalization cover the no-show/quorum-miss path. Exact-3/3 question and escrow
> regressions cover both fixes. The recorded mainnet deployment is immutable and remains
> affected until replaced. The same replacement now uses the documented World ID
> mainnet Router; the immutable v4 adapter is classified as historical preview evidence.

## Bottom line

The build is **real and unusually honest** — it survived an adversarial audit. The
findings below preserve the original review record; remediation notes distinguish the
replacement source from the still-affected legacy deployment.

**Verified strengths (the defensible core):**

- The original audit snapshot had **77 Foundry tests** and **97.17% line / 93.66%
  statement / 92.86% function** coverage. The first quorum-recovery snapshot had 85
  tests and measured **89.60% line / 86.44% statement / 91.67% function** overall,
  including **98.49% line for `DisputeCourt`** and **100% line for `JurorRegistry`**.
  The current Router-gate/party-exclusion/first-draw release has **100 passing tests**.
  The prior 95-test liveness snapshot measured
  **89.51% line (529/591), 86.67% statement (598/690), 76.11% branch (86/113), and
  92.22% function (83/90)** coverage overall; `DisputeCourt` is **96.43% line
  (216/224)** and `JurorRegistry` is **100% line**. Do not attach either historical
  coverage figure to the current 100-test release.
- **Secrets are clean** — `.env` was never committed, history is scrubbed, `.gitignore`
  is correct.
- **Slash-to-pool, atomic settlement, fee conservation, commit/reveal binding,
  wallet-bound proofs, and "no admin override"** all check out against the code.
- **Historical v4 proof check in-transaction**; those traces genuinely exercise the
  preview adapter but are not production-readiness evidence. The supported replacement
  path is `WorldIDRouterGate` over the documented mainnet Router.
- The **honesty rule is implemented consistently in the UI**; nothing claims humans have
  used the mainnet court while `jurorCount()==0`.

## Weak spots that actually matter

### A. Smart-contract correctness & security

1. **🔴 Historical finding — fixed in replacement source; legacy deployment remains
   affected.** The old court checks raw active count before later excluding parties, and
   has no terminal path if an accepted case never draws. The replacement checks
   case-specific eligibility before `openQuestion()` pulls its fee or `dispute()` can
   commit escrow state. If eligibility later falls, its immutable first-draw deadline
   lets anyone cancel/unwind without a merits ruling and refund the entire unused fee;
   `InitialDrawTimedOut` distinguishes that terminal reason while the escrow callback
   returns principal to the payer. Separate Permit2 re-bond and redraw-timeout handling
   cover the no-show path. These guarantees require a fresh deployment.
2. **Resolved by removal from the production path.** The historical `WorldIDGate` ignores the verifier's
   return value and relies on it **reverting** on a forged proof — confirmed only against
   Staging. If the **Production** verifier returns `false` instead of reverting, the gate
   **fails open** and "a forged proof reverts" is falsified on camera at the capstone.
   → send a forged proof to the Production gate via `cast` and confirm it reverts *before*
   any human onboards. The replacement no longer depends on that assumption: it calls
   the documented Router, which reverts on invalid proofs. Keep the old concern attached
   only to the preview adapter and test a forged Router proof before the capstone.
3. **🟠 Partial-slash leaves an under-bonded juror in the draw pool** (latent today —
   the sole slasher always full-slashes — but breaks the stated invariant if a future
   partial slash lands; zero test coverage of the branch).
4. **🟠 A single $5 bond covers unlimited concurrent panels** — the liveness penalty
   doesn't scale with abandoned panels; untested overlapping-case path.
5. **🟠 No on-chain proof freshness** (nonce/expiry decoded but unchecked); anti-replay
   rests on the per-instance nullifier mapping only.

> Already fine (verified): the blockhash panel-randomness weakness is **not** an
> over-claim — it is disclosed as funded-milestone #1 in four docs, and the live chain is
> an OP-stack L2.

### B. The capstone is a one-shot with unguarded landmines

None of these are in the runbook, and each is invisible until a real phone runs it:

- **Historical 3/3 party-exclusion deadlock.** The legacy court can accept a case from
  an active opener/party and then find only 1–2 eligible jurors. The replacement rejects
  that case before funds or escrow state lock, and its fixed first-draw unwind protects
  against a later withdrawal. Keep the official opener non-juror and recruit a wider pool
  as operational reserves, then prove the source fix on the replacement deployment.
- **Historical duration sequencing trap — fixed in replacement source.** The legacy
  court's `setDurations` could change an open-but-undrawn case. The replacement removes
  that function, makes both durations immutable with a five-minute minimum, and exposes
  `AUTOMATED_TIMING_VERSION() == 1`; a fresh deployment is still required.
- **Faucet-in-batch revert** for a returning wallet on the 24h cooldown reverts the whole
  onboard batch — pre-fund the 3 wallets and rehearse on a throwaway.
- **Constructor immutables never `cast`-verified** against the deployment JSON — a wrong
  arg makes every real proof revert opaquely.
- **No contingency plan** if the capstone fails or the verifier misbehaves.

### C. Honesty / consistency leaks (the differentiator is honesty, so these hurt extra)

- **🟠 The deployment JSON** said *"mainnet-live… 3 real humans register here"* while
  `jurorCount()==0`. *(Fixed during this engagement.)*
- **🟠 "$13 to flip a 3-seat panel"** still sits inline on the cost-to-corrupt chart, one
  footnote from "can't be bought." Reframe as a deliberate liveness/cost demo whose
  security property is pool width.
- **🟠 "First dispute-resolution app in World App"** reads as absolute in the README vs the
  scoped evidence ("none found in one dated scan").
- **🟠 Differentiation gaps:** omit **Aragon Court**, and don't confront the *"World ID is
  itself a sybil primitive of the Proof-of-Humanity lineage"* reframing — the two
  strongest reviewer rebuttals. *(Both addressed in the new application copy.)*
- Contract NatSpec (in source-verified bytecode) still says "mainnet live instance" — can't
  be changed without redeploy; disclose rather than retroactively edit.

### D. Web & repo hygiene

- **🟠 `/api/dev-register` is an unauthenticated private-key relayer** when
  `NEXT_PUBLIC_SHOW_DEV='true'` — inert in prod (double-gated), but the only guard is an
  env boolean. Add real authz; hard-fail when `!IS_COHORT`.
- **🟠 The `(protected)` route group isn't actually access-controlled** (auth redirect
  commented out) — no fund risk, but contradicts the "protected" label.
- **🟠 [MECHANISM_DELTA.md](MECHANISM_DELTA.md) cites a non-existent `toupdate.md`** — the
  one dangling doc ref.
- Dead template scaffolding (Pay/Verify/UserInfo); root metadata still "Template Mini App";
  `.claude/` untracked but not gitignored (risks a careless `git add .` on the public flip).

## What's left to do before submitting

The team's own ordering ("capstone first") is sound. The critical path:

**Hard gates (binary — void the application):**

1. **Public repository — resolved.** The MIT-licensed repository is public; keep the final
   capstone and video evidence links current.
2. **Applicant location facts are recorded, but eligibility needs written guidance** — one

# Case liveness recovery

Status: implemented in the source tree and covered by 100 passing Foundry tests, including five new Router-gate tests. The prior 95-test liveness snapshot measured 89.51% line, 86.67% statement, 76.11% branch, and 92.22% function overall; do not attribute that historical coverage run to the Router-gate release. A fresh World Chain deployment and app/keeper cutover are still required.

The historical 3-seat / minimum-3 deployment has two independent ways to accept a case that can never progress:

1. It checks the raw active-juror count when a case opens, then excludes the question opener or both escrow parties at draw time. An active party can therefore reduce a nominal pool of three to only one or two eligible jurors after the fee or escrow state has already been locked.
2. A no-show loses the full bond and leaves the active pool. After a quorum miss, excluding the no-show from the retry leaves too few eligible jurors to draw another three-seat panel. Even when two reveals settle the current case, one no-show leaves only two active jurors for the next one.

The replacement source closes both paths. The legacy Step-5 addresses do not change and remain affected.

## Opening and first-draw escape

Before either case type accepts funds or state, `DisputeCourt` computes the active jurors who are actually eligible for that case:

- subtract the question opener when that address is an active juror;
- subtract the escrow payer and payee when either is active, counting the same address only once; and
- require the remaining count to be at least `MIN_POOL` (`MIN_POOL` is constructor-checked to be at least `PANEL_SIZE`).

`openQuestion()` performs this preflight before pulling its 20 MUSD case fee. `DealEscrow.dispute()` calls the same check through `openFromEscrow()`; if it fails, the whole transaction reverts atomically, so the deal remains `Funded` and the principal plus fee stay in escrow. An exact-three pool therefore cannot accept a case opened by one of those three jurors.

Every accepted case receives a fixed `initialDrawDeadline` one hour after opening. Failed draws and blockhash re-arms do not move it. A successful first draw clears it. After it expires:

1. another draw is rejected and `phaseOf()` reports `Resolvable`;
2. anyone may call `resolve()`—neither party nor an operator can hold the escape path hostage;
3. the entire unused case fee is returned to `party1` and `InitialDrawTimedOut` records the beneficiary and amount; and
4. the case closes as an **initial-draw cancellation**, not a merits ruling. For ABI compatibility the court emits `Resolved(false, 0, 0)` and uses the existing escrow `settle(false)` callback, but `InitialDrawTimedOut` is the terminal-reason discriminator. Interfaces and receipts must render “unwound/refunded,” never question NO. For escrow, the payer receives the unused 2% court fee directly and the callback returns the full principal to that payer.

This deadline is a backstop for eligibility changing after acceptance—for example, a juror withdrawing before the first draw—not a substitute for the opening preflight.

## Quorum-miss retry

The replacement contracts also preserve the full no-show penalty and the invariant that every active juror has a full bond:

1. A no-show is fully slashed and deactivated.
2. The verified human may post a fresh full bond and rejoin without repeating World ID verification. World App uses `postBondWithPermit2()`; the classic allowance path remains available through `postBond()`.
3. A first quorum miss clears the first panel and opens one retry with a separate, fixed one-hour `redrawDeadline`.
4. Re-bonded jurors and any additional active jurors are eligible for that retry. Failed or delayed draw attempts never extend the deadline.
5. If a full panel is drawn before the recovery deadline, it receives normal seal and reveal windows. A second quorum miss resolves to status quo.
6. If the pool cannot recover before the deadline, `phaseOf()` reports `Resolvable` and anyone may call `resolve()`. The question resolves NO; a disputed escrow refunds its payer; the case fee is distributed exactly once under the normal no-winner path.

The browser ballot key includes the retry number, so a juror selected again receives a fresh salt instead of reusing a salt disclosed in the first round. Existing first-round secrets are migrated from the legacy key only into round zero; they are never carried into a retry.

## Pool and keeper behavior

`PANEL_SIZE` remains 3. The contract is fund-safe with `MIN_POOL = 3`: a later loss of eligibility cannot strand funds because the first-draw deadline unwinds the case. For the replacement deployment, use `MIN_POOL >= PANEL_SIZE + 1`—at least 4 for a three-seat court—so one eligible juror may withdraw before the draw without forcing a refund instead of an adjudication. This is an availability reserve, not a substitute for the case-specific preflight. The configured minimum is an eligible count, never a maximum active pool. The keeper now:

- checks `eligibleJurorCount()` before opening the official question and again before drawing;
- opens only when the case-specific eligible count is at least `MIN_POOL`;
- draws only when the case-specific eligible count is at least `PANEL_SIZE`;
- accepts a wider active pool; and
- finalizes an expired initial-draw or redraw deadline even when fewer than three jurors are active.

Additional verified humans therefore provide useful recovery capacity instead of pausing the official queue. The official opener remains a separate, non-juror wallet, but correctness no longer depends on that operational convention alone.

The keeper refuses every `--execute` run unless the selected deployment record marks the current source as deployed and all seven release capabilities as present, including immutable voting durations. It also checks `LIVENESS_RECOVERY_VERSION() == 2` on the court, `LIVENESS_RECOVERY_VERSION() == 1` on the registry, and `AUTOMATED_TIMING_VERSION() == 1` on the court, so metadata alone cannot unlock writes. Read-only inspection of the legacy instance remains available.

Commit and reveal durations are immutable constructor parameters and each must be at least five minutes. The replacement exposes no duration setter, so opening a case before its panel is drawn cannot create an administrative timing gap. Draws convert the fixed durations into case deadlines; every subsequent transition remains permissionless.

The official queue authenticates cases by type, URI, exact hash, and fixed opener. The keeper warns about but ignores nonofficial cases when enforcing its one-active-official-case rule, so an outsider cannot censor the official queue merely by opening refundable cases. Nonofficial cases can still compete for juror availability at the contract layer; this remains a controlled demo rather than contract-level admission control.

## Token scope

The timeout refund and escrow-principal return are direct token transfers inside the resolving transaction. Liveness therefore assumes the deployment's immutable, trusted MockUSD does not pause transfers or blacklist the opener/payer. That is true of this valueless demo token. A generalized production integration with a pausable, blacklistable, or otherwise adversarial token should credit a pull-based claim balance instead, so recipient-specific transfer policy cannot block terminal case state.

## Deployment boundary

The current mainnet registry, court, and escrow are immutable or wire-once contracts. Editing this repository does not change the contracts at the recorded addresses. The existing Step-5 deployment remains a legacy, affected instance and must not be used for the capstone.

Before resuming the capstone:

1. Run the complete Foundry suite and regenerate the committed ABIs.
2. Deploy a fresh registry, court, reward pool, and escrow through the normal deployment script, wired to the Production World ID verifier and canonical Permit2.
3. Source-verify the replacement contracts and record their addresses, deployment block, transactions, parameters, and all seven release capabilities in a new deployment record. Preserve the legacy record as history. Set the source-match and capability fields only after verification.
4. Confirm the replacement reports court liveness version 2, registry liveness version 1, and automated timing version 1; verify the immutable voting durations are at least 300 seconds each.
5. Update the Mini App addresses and deploy block, then add every replacement contract and `postBondWithPermit2()` call to the World Developer Portal permissions.
6. Deploy the Mini App, switch the scheduled keeper, and run it read-only before broadcasting.
7. Deploy the three-seat capstone with `MIN_POOL >= 4` and register at least four eligible humans; record the exact values. Also exercise the exact-3/3 source-level paths: party-exclusion rejection before funds lock, withdrawal after acceptance plus first-draw unwind, full participation, one no-show plus re-bond for the next case, quorum miss plus successful retry, and quorum miss plus timeout/status-quo finalization. Confirm both the question-fee refund and escrow fee/principal return from emitted events and balances.

Until those steps are complete, source-level tests prove the remediation logic but no public page should describe the legacy address as liveness-recovered or capstone-ready.

# DemoThemis MVP

A working demo of the **DemoThemis arbitration court** for the World Foundation
Spark Track grant: a juror court gated by a **World ID proof verified on-chain
through the documented World ID Router**, running on
World Chain, with a browser sandbox that simulates the full mechanism.

## Why it's different

The decentralized courts that exist — **Kleros** and **UMA** — pick jurors by
**stake**, so influence tracks capital; and inside the World ecosystem, no Mini App
or grant project does dispute resolution at all. **DemoThemis is, to our knowledge,
the first to gate the jury by _personhood_ instead of capital** — one verified human,
one vote — and the first dispute-resolution app in World App. Token-weighted courts (UMA, Kleros) are bought once — acquire a majority of stake, a fixed and
knowable price, and you own that verdict and every future one for free. DemoThemis removes that
target: the panel is drawn at random **after** the question, from the whole verified-human pool,
so an attacker can't know or pick who will judge their case. To land a bribed majority they'd have
to pre-corrupt a near-majority of the **entire pool** — and still only get a chance, not a verdict
(bribing ~19% of a 200k pool yields a ~2.9% shot at flipping one panel). It doesn't amortize: a
fresh panel is drawn for every case, so the whole pool-corruption cost is paid again, per case,
while the price climbs with pool width, case volume, and value at stake (above a value line,
independent panels must all agree, multiplying the odds ~1/5 → 1/125 → 1/3000, and any captured
panel is appealed into a larger one). Cost-to-capture scales with pool width × case volume ×
value-at-stake — never a flat panel bribe. Full scan +
comparison: [docs/DIFFERENTIATION.md](docs/DIFFERENTIATION.md).

**Status: the case-liveness, automated-timing, and Router-gate release is implemented and tested (100 Foundry tests pass); mainnet
redeployment is required before the live capstone.** The previously deployed
v4 preview-verifier instance is source-verified historical evidence, but its immutable
3/3 court predates this fix and remains vulnerable both to a no-show stall and to
accepting a case whose parties leave fewer than three eligible jurors. Do not register
capstone jurors against the recorded Step-5 addresses. The replacement source keeps the
3-seat panel, fixes the question fee at 20 MUSD, fixes both voting windows at deployment with a five-minute minimum and no duration setter, checks the case-specific eligible pool before accepting funds, and gives every accepted case a
fixed one-hour first-draw escape. If no panel forms, anyone can unwind it: the unused fee
returns to the opener/payer and escrow principal returns to the payer. The same source lets
a slashed verified human rejoin with a fresh Permit2 bond and permissionlessly resolves
status quo if the separate one-hour retry window cannot form a new panel. A minimum of three
eligible jurors is fund-safe because of that unwind; the replacement deployment should use at
least four (`PANEL_SIZE + 1`) so one pre-draw withdrawal does not sacrifice adjudication
availability. The pool has no maximum. See
[docs/LIVENESS_RECOVERY.md](docs/LIVENESS_RECOVERY.md) for the lifecycle and cutover
checklist.

The browser sandbox and comparative "buy this verdict" attack demo are complete, and a
~20-juror scale demo with resolved cases runs on the World Chain **Sepolia cohort**.
The mainnet demo uses a single 3-seat panel on purpose: it proves the mechanism
end-to-end. Both the historical minimum-3 pool and the recommended minimum-4 replacement
remain cheaply flippable — this is a liveness/cost demo, not the security claim. Capture-
resistance is the at-scale property: because the panel is drawn at random after the question, an
attacker can't target it and must instead corrupt a near-majority of the whole pool, per case,
for only a probability — so cost rises with pool width (plus parallel pᴺ panels and the appeal
ladder above a value line). Widening the pool and panel and turning on parallel panels + appeals
is funded-milestone work, not a research risk; the full regime is shown in the labeled sandbox. The historical v4 adapter is exercised by three
Step-3.5 enforcement
traces (a valid registration, a forged-proof revert, a duplicate-human revert) —
using World ID **Simulator / Staging** identities, labeled as such. The
v4 preview path was exercised on the legacy deployment; it is not the production
dependency. The replacement uses the documented mainnet Router, and the live capstone is paused
until the recovery contracts are freshly deployed and wired (`docs/CAPSTONE_RUNBOOK.md`).
No real human has registered on the legacy preview-verifier instance yet

- **Sponsored gas** — verified humans pay nothing (to be captured as a worldscan trace

Contracts (Foundry runs in WSL on the build machine; CI on ubuntu is the arbiter):

```bash
cd contracts
forge build
forge test          # full unit, fuzz, invariant, and exact-3/3 recovery suite

Web (Node 20+, pnpm 9):

```bash
cd web
pnpm install
pnpm gen:contracts  # regenerate ABIs from ../contracts/out (after a forge build)

```

- **Foundry** (repo-root `.env`, see `.env.example`): `PRIVATE_KEY` (deployer; never
  a personal key), optional `vm.envOr` overrides `PANEL_SIZE` / `MIN_POOL` /

Simulated data is labeled simulated, everywhere, every time. The sandbox is a

on-chain slice; the test tokens (MockUSD) are valueless on every network. World App

`/cases/queue/01-dimorphos-orbit-change.json`. The keeper recognizes a case only
when all four identity fields match: question type, URI, exact hash, and fixed
opener.

## 3. Verify immutable human-safe voting windows

The deployer set both windows to five minutes on the legacy court on 2026-07-14. That mutable
[World Chain transaction](https://worldscan.org/tx/0x429dfd1ad1aa5e0f628ea02c47950e440ad658b38540401d8ae045f3316866ca)
is historical configuration evidence only; the replacement removes `setDurations` entirely.

Deploy the replacement with five-minute windows (the deployment script defaults to these values):

```bash
WORLD_ID_ROUTER=0x17B354dD2595411ff79041f930e491A4Df39A278 \
  WORLD_ID_APP_ID=app_7bdfda4db4e2f59dd4a2427cd2bd860d \
  PANEL_SIZE=3 MIN_POOL=4 COMMIT_DURATION=300 REVEAL_DURATION=300 \
  forge script script/Deploy.s.sol --rpc-url worldchain_mainnet --broadcast
```

The contract rejects either constructor value below 300 seconds. After selecting the
replacement addresses, verify the immutable values and the automated-timing marker with:

```bash
node scripts/mainnet-question-keeper.mjs
```

Record the replacement deployment transaction and constructor values in the evidence
table. The report must show `AUTOMATED_TIMING_VERSION() == 1` and at least
`300s seal / 300s reveal`. The keeper command above is a read-only dry run and
broadcasts nothing.

## 4. Register at least four eligible jurors — only after the replacement gate passes

Each human must:

1. Open the Netlify Mini App through the verified World App preview QR.
2. Visit `/onboard` and sign in with the wallet they will use for both voting
   stages.
3. Tap **Verify with World ID & join**.
4. Complete the Router-compatible Orb proof and the valueless 5 MUSD bond batch.
5. Save the registration Worldscan link for the final evidence table.

Keep every selected panelist reachable for both voting windows. They must reveal on the
same device/browser storage used to seal because that device holds the ballot
secret.

After each registration, run the dry report again. Deploy with `PANEL_SIZE = 3` and
`MIN_POOL >= 4`, then wait for at least four **eligible** jurors before opening. The
contract remains fund-safe at an exact eligible count of three because its fixed
first-draw deadline can unwind, but that setting has no one-withdrawal adjudication
reserve. The keeper uses the court's case-specific eligible count rather than raw
`jurorCount()`. Additional active jurors are allowed; the pool has no maximum.

## 5. Verify the scheduled keeper

The workflow is `.github/workflows/mainnet-question-keeper.yml`. It runs every
five minutes, serially, and broadcasts at most one operator transaction per run.
Repository secret `MAINNET_QUESTION_KEEPER_PRIVATE_KEY` was configured on
2026-07-14 from the authorized ignored local credential. Its derived public
address matches the fixed opener above. The secret value was not printed or
committed, and the opener must never register as a juror.

Confirm only the secret name and workflow history:

```bash
gh secret list --repo FreddyMertens/DemoThemis
gh run list --repo FreddyMertens/DemoThemis --workflow mainnet-question-keeper.yml --limit 10
```

Before the deployed minimum pool exists, a healthy run reports `WAITING` and exits successfully
without broadcasting. The keeper's first necessary runs after registration may
separately claim valueless MUSD, approve
the court, open question one, and draw its panel. This deliberate one-step limit
makes every transition easy to inspect and prevents a single run from racing the
human actions.

For an attended review, the same operator may run one step manually. Put the
authorized key in the ignored `DemoThemisMVP/.env` file as `PRIVATE_KEY`, then
load that file without putting the key itself in shell history:

```bash
set -a
source .env
set +a
node scripts/mainnet-question-keeper.mjs --execute
unset PRIVATE_KEY
```

Run those commands from `DemoThemisMVP`, only in a private shell with an
authorized operator. Restrict access to the ignored `.env`; the scheduled secret
is preferred. Never run `--execute` before checking the dry report.

## 6. Complete question one

1. Wait for the keeper to open and draw question one.
2. Confirm `/app` shows the exact question, YES rule, judged-as-of time, three
   panel wallets, and a Worldscan filing/draw receipt.
3. All three jurors independently research the public question.
4. All three seal their answers in World App and save each transaction link.
5. All three return on the same device and reveal their answers.
6. After the reveal deadline, let a later keeper run resolve the case.
7. Confirm the permanent receipt shows `3/3` seals, `3/3` reveals, tally, ruling,
   individual valueless MUSD payments, the 70/20/10 distribution, and links for
   every on-chain stage.
8. Confirm a later keeper run opens question two—and only then.

If anyone misses reveal, do not improvise or manually alter the pool. Let the
keeper resolve the elapsed round. A first quorum miss starts the fixed one-hour
recovery window. Each fully slashed juror can use **Post a fresh bond & rejoin**
without repeating World ID; the keeper draws the retry once three panel candidates
are active. If the pool cannot recover in time, a later keeper run permissionlessly
finalizes status quo. The recovery deadline never extends, and a second quorum
miss also finalizes status quo.

If the first panel cannot be drawn after an accepted case—for example, because a
juror withdraws—do not repeatedly re-arm it or add funds. Its fixed one-hour
`initialDrawDeadline` never moves. After expiry, a later keeper run permissionlessly
unwinds the case: the entire unused case fee returns to the opener, or for escrow the
unused fee and principal both return to the payer. Confirm the `InitialDrawTimedOut`
beneficiary/amount and the final settlement events before advancing the queue.

If the dry report names more than one unresolved **official** case, stop. A nonofficial
case is reported as a warning and deliberately ignored by the one-active-official-case
policy; it cannot censor the queue merely by being opened. Still review it because a
parallel outside case can compete for juror availability at the contract layer.

Add these links to `docs/DEMO.md`:

- One sponsored World App transaction trace

- All three `Committed` and all three `Revealed` transactions

- The permanent Netlify case receipt
- Question two's `CaseOpened` transaction, proving sequential advancement

Only after those links exist should the three-juror MVP be described as a
completed real run.

<script>
(function(){
  "use strict";
  var $ = function(s,c){return (c||document).querySelector(s)};
  var $$ = function(s,c){return Array.prototype.slice.call((c||document).querySelectorAll(s))};

  // ---- collect docs ----
  var scripts = $$('script[type="text/markdown"]');
  var docs = scripts.map(function(s){
    return { id:s.getAttribute('data-id'), title:s.getAttribute('data-title'),
             group:s.getAttribute('data-group'), badge:s.getAttribute('data-badge')||'',
             source:s.getAttribute('data-source')||'', desc:s.getAttribute('data-desc')||'',
             md:s.textContent };
  });
  // standalone HTML pages (e.g. the storyboard) — shown in an embedded iframe
  var htmlDocs = (window.__HTML_DOCS__||[]).map(function(h){
    return { id:h.id, title:h.title, group:h.group, badge:h.badge||'', source:h.file, desc:h.desc||'', htmlFile:h.file };
  });
  docs = docs.concat(htmlDocs);
  var overview = { id:'overview', title:'Overview', group:'Start here', badge:'', desc:'The dashboard: stats, status, and a map of everything in here.' };
  var entries = [overview].concat(docs);
  var order = entries.map(function(e){return e.id});
  var byId = {}; entries.forEach(function(e){byId[e.id]=e});

  // ---- build sidebar nav ----
  var nav = $('#nav'), groups = [], gmap = {};
  entries.forEach(function(e){ if(!gmap[e.group]){gmap[e.group]=[];groups.push(e.group)} gmap[e.group].push(e) });
  groups.forEach(function(g){
    var lab = document.createElement('div'); lab.className='group-label'; lab.textContent=g; nav.appendChild(lab);
    gmap[g].forEach(function(e){
      var b=document.createElement('button'); b.className='nav-item'; b.dataset.id=e.id;
      var t=document.createElement('span'); t.className='ni-title'; t.textContent=e.title; b.appendChild(t);
      if(e.badge){ var p=document.createElement('span'); var cls=e.badge.indexOf('done')>-1?'ok':(e.badge.indexOf('pend')>-1?'warn':'info'); p.className='pill '+cls; p.textContent=e.badge.replace(/^(done|pend|info):/,''); b.appendChild(p) }
      b.addEventListener('click',function(){ go(e.id) });
      nav.appendChild(b);
    });
  });

  // ---- overview cards ----
  function buildOverviewCards(root){
    var grid = $('#ov-cards', root); if(!grid) return;
    docs.forEach(function(e){
      var c=document.createElement('button'); c.className='card';
      c.innerHTML = '<div class="cg">'+esc(e.group)+'</div><div class="ct">'+esc(e.title)+'</div><div class="cd">'+esc(e.desc||'')+'</div>';
      c.addEventListener('click',function(){ go(e.id) });
      grid.appendChild(c);
    });
    $$('[data-goto]',root).forEach(function(a){ a.addEventListener('click',function(ev){ev.preventDefault();go(a.dataset.goto)}) });
  }

  // ---- render ----
  var view=$('#view'), main=$('#main'), tocEl=$('#toc'), crumb=$('#crumb');
  var headingObserver=null;
  function render(id){
    var e=byId[id]; if(!e) id='overview', e=byId.overview;
    view.innerHTML='';
    if(id==='overview'){
      var node=document.importNode($('#tpl-overview').content,true);
      view.appendChild(node); buildOverviewCards(view);
      crumb.innerHTML='<b>Overview</b>'; tocEl.innerHTML='<div class="empty">—</div>';
      main.scrollTop=0; setBar(); return;
    }
    if(e.htmlFile){
      var w2=document.createElement('div'); w2.className='doc'; w2.style.maxWidth='none';
      var h2=document.createElement('div'); h2.className='doc-head';
      h2.innerHTML='<div class="src">🎬 '+esc(e.source)+'</div><h1 class="dt">'+esc(e.title)+'</h1>'+
        '<div class="meta"><span>'+esc(e.group)+'</span><span>·</span><a href="'+esc(e.htmlFile)+'" target="_blank" rel="noopener">open full page ↗</a></div>';
      w2.appendChild(h2);
      var fr=document.createElement('iframe'); fr.src=e.htmlFile+'?embed=1'; fr.setAttribute('title',e.title); fr.allowFullscreen=true; fr.setAttribute('allow','fullscreen');
      fr.style.cssText='width:100%;height:calc(100vh - 128px);min-height:520px;border:1px solid var(--line);border-radius:12px;background:#fff';
      w2.appendChild(fr); view.appendChild(w2);
      crumb.innerHTML='<b>'+esc(e.title)+'</b>'; tocEl.innerHTML='<div class="empty">Standalone page</div>';
      main.scrollTop=0; setBar(); return;
    }
    var wrap=document.createElement('div'); wrap.className='doc';
    var head=document.createElement('div'); head.className='doc-head';
    var words=(e.md.trim().split(/\s+/).length); var mins=Math.max(1,Math.round(words/200));
    head.innerHTML='<div class="src">📄 '+esc(e.source||(e.id+'.md'))+'</div><h1 class="dt">'+esc(e.title)+'</h1>'+
      '<div class="meta"><span>'+esc(e.group)+'</span><span>·</span><span>'+words.toLocaleString()+' words · '+mins+' min read</span></div>';
    wrap.appendChild(head);
    var body=document.createElement('div'); body.className='md';
    if(window.marked && window.marked.parse){
      try{ body.innerHTML = window.marked.parse(e.md,{gfm:true,breaks:false,headerIds:false,mangle:false}); }
      catch(err){ body.appendChild(rawFallback(e.md)); }
    } else {
      var fb=document.createElement('div'); fb.className='fallback'; fb.textContent='Markdown renderer offline — showing raw source. (Connect to the internet once to load the renderer.)';
      body.appendChild(fb); body.appendChild(rawFallback(e.md));
    }
    wrap.appendChild(body); view.appendChild(wrap);
    enhance(body, e.title);
    main.scrollTop=0; setBar();
  }
  function rawFallback(md){ var pre=document.createElement('pre'); var c=document.createElement('code'); c.textContent=md; pre.appendChild(c); return pre; }

  // ---- enhance rendered markdown: tables, links, headings, toc ----
  function slug(t){ return t.toLowerCase().replace(/[^\w\s-]/g,'').trim().replace(/\s+/g,'-').slice(0,60) }
  function enhance(body, title){
    $$('table',body).forEach(function(t){ if(t.parentElement.className==='tablewrap')return; var w=document.createElement('div'); w.className='tablewrap'; t.parentNode.insertBefore(w,t); w.appendChild(t) });
    // links: internal .md -> portal nav; external -> new tab
    $$('a',body).forEach(function(a){
      var href=a.getAttribute('href')||'';
      if(/^https?:/.test(href)){ a.target='_blank'; a.rel='noopener'; return; }
      var m=href.match(/([A-Za-z0-9_\-]+)\.md(#.*)?$/);
      if(m){ var base=m[1]; var tgt=docs.filter(function(d){return (d.source||'').replace(/\.md$/,'').split('/').pop()===base || d.id===base.toLowerCase()})[0];
        if(tgt){ a.setAttribute('href','#'+tgt.id); a.addEventListener('click',function(ev){ev.preventDefault();go(tgt.id)}); }
      }
    });
    // headings -> ids + toc
    var hs=$$('h2,h3',body); tocEl.innerHTML='';
    if(!hs.length){ tocEl.innerHTML='<div class="empty">No subsections</div>'; }
    var used={};
    hs.forEach(function(h){
      var s=slug(h.textContent)||'s'; if(used[s])s+='-'+(++used[s]); used[s]=1; h.id=s;
      var a=document.createElement('a'); a.href='#'+s; a.textContent=h.textContent; a.className=h.tagName==='H3'?'h3':'';
      a.addEventListener('click',function(ev){ ev.preventDefault(); var t=document.getElementById(s); if(t)main.scrollTo({top:t.offsetTop-70,behavior:'smooth'}); });
      tocEl.appendChild(a);
    });
    crumb.innerHTML='<b>'+esc(title)+'</b>';
    // scrollspy
    if(headingObserver)headingObserver.disconnect();
    if(hs.length){
      headingObserver=new IntersectionObserver(function(ents){
        ents.forEach(function(en){ if(en.isIntersecting){ var id=en.target.id;
          $$('.toc a').forEach(function(x){x.classList.toggle('active', x.getAttribute('href')==='#'+id)}); } });
      },{root:main, rootMargin:'-70px 0px -75% 0px', threshold:0});
      hs.forEach(function(h){headingObserver.observe(h)});
    }
  }
  function esc(s){ return (s||'').replace(/[&<>"]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]}) }

  // ---- nav state / routing ----
  var cur='overview';
  function setActive(id){ $$('.nav-item').forEach(function(b){b.classList.toggle('active',b.dataset.id===id)}); var a=$('.nav-item.active'); if(a)a.scrollIntoView({block:'nearest'}); }
  function go(id){ if(!byId[id])id='overview'; cur=id; if(location.hash!=='#'+id)history.pushState(null,'','#'+id); render(id); setActive(id); document.body.classList.remove('nav-open'); }
  function fromHash(){ var h=(location.hash||'').replace('#',''); go(byId[h]?h:'overview'); }

  // prev/next
  $('#prev').addEventListener('click',function(){ var i=order.indexOf(cur); if(i>0)go(order[i-1]) });
  $('#next').addEventListener('click',function(){ var i=order.indexOf(cur); if(i<order.length-1)go(order[i+1]) });

  // ---- search ----
  $('#search').addEventListener('input',function(e){
    var q=e.target.value.trim().toLowerCase();
    var anyByGroup={};
    entries.forEach(function(en){
      var hit = !q || en.title.toLowerCase().indexOf(q)>-1 || (en.desc||'').toLowerCase().indexOf(q)>-1 || (en.md||'').toLowerCase().indexOf(q)>-1;
      var btn=$('.nav-item[data-id="'+en.id+'"]'); if(btn)btn.style.display=hit?'':'none';
      anyByGroup[en.group]=anyByGroup[en.group]||hit;
    });
    $$('.group-label').forEach(function(l){ anyByGroup[l.textContent]; l.style.display=anyByGroup[l.textContent]?'':'none'; });
  });

  // ---- theme ----
  function applyTheme(t){ document.documentElement.setAttribute('data-theme',t); $('#ic-moon').style.display=t==='dark'?'':'none'; $('#ic-sun').style.display=t==='dark'?'none':''; try{localStorage.setItem('dt-theme',t)}catch(e){} }
  $('#theme').addEventListener('click',function(){ applyTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark') });
  (function(){ var t='dark'; try{t=localStorage.getItem('dt-theme')||'dark'}catch(e){} applyTheme(t) })();

  // ---- progress bar ----
  var bar=$('#bar');
  function setBar(){ var h=main.scrollHeight-main.clientHeight; bar.style.width=(h>0?(main.scrollTop/h*100):0)+'%'; }
  main.addEventListener('scroll',setBar,{passive:true});

  // ---- mobile nav ----
  $('#hamburger').addEventListener('click',function(){ document.body.classList.toggle('nav-open') });
  $$('[data-close-nav]').forEach(function(x){x.addEventListener('click',function(){document.body.classList.remove('nav-open')})});

  // ---- keyboard ----
  document.addEventListener('keydown',function(e){
    if(e.target.tagName==='INPUT'){ if(e.key==='Escape')e.target.blur(); return; }
    if(e.key==='/'){ e.preventDefault(); $('#search').focus(); }
    else if(e.key==='ArrowLeft'){ var i=order.indexOf(cur); if(i>0)go(order[i-1]) }
    else if(e.key==='ArrowRight'){ var i=order.indexOf(cur); if(i<order.length-1)go(order[i+1]) }
    else if(e.key==='t'){ $('#theme').click() }
  });

  window.addEventListener('popstate',fromHash);
  fromHash();
})();
</script>
