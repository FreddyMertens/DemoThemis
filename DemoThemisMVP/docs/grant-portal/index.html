<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>DemoThemis — Grant Review Portal</title>
<meta name="description" content="A navigable review portal for the DemoThemis World Foundation grant application." />
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<style>
  :root{
    --bg:#0b0d12; --panel:#12151c; --panel-2:#161a23; --elev:#1b2030;
    --line:#242a37; --line-2:#2e3548;
    --txt:#e7eaf2; --txt-dim:#9aa3b8; --txt-faint:#6b7488;
    --accent:#7c5cff; --accent-2:#5a7bff; --accent-soft:rgba(124,92,255,.14);
    --ok:#34d399; --ok-soft:rgba(52,211,153,.13);
    --warn:#fbbf24; --warn-soft:rgba(251,191,36,.13);
    --bad:#fb7185; --bad-soft:rgba(251,113,133,.13);
    --code-bg:#0e1118; --radius:14px; --radius-sm:9px;
    --sb:280px; --toc:236px;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
  }
  html[data-theme="light"]{
    --bg:#f6f7fb; --panel:#ffffff; --panel-2:#ffffff; --elev:#ffffff;
    --line:#e6e8ef; --line-2:#d7dbe6;
    --txt:#171a21; --txt-dim:#5a6378; --txt-faint:#8a92a6;
    --accent:#6a44ff; --accent-2:#3f63ff; --accent-soft:rgba(106,68,255,.10);
    --ok:#0ea371; --ok-soft:rgba(14,163,113,.12);
    --warn:#b8860b; --warn-soft:rgba(184,134,11,.12);
    --bad:#e1495f; --bad-soft:rgba(225,73,95,.10);
    --code-bg:#f1f3f9;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--txt); font-family:var(--sans);
    font-size:15.5px; line-height:1.6; -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  a{color:var(--accent-2); text-decoration:none}
  a:hover{text-decoration:underline}

  .app{display:grid; grid-template-columns:var(--sb) minmax(0,1fr) var(--toc); height:100vh}

  /* ---------- sidebar ---------- */
  .sidebar{background:var(--panel); border-right:1px solid var(--line); display:flex; flex-direction:column; min-height:0}
  .brand{padding:18px 18px 14px; border-bottom:1px solid var(--line)}
  .brand h1{font-size:15px; margin:0; letter-spacing:.2px; display:flex; align-items:center; gap:9px}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 0 0 4px var(--accent-soft)}
  .brand .sub{color:var(--txt-dim); font-size:12px; margin-top:5px}
  .search{padding:12px 14px 6px}
  .search input{
    width:100%; background:var(--panel-2); border:1px solid var(--line-2); color:var(--txt);
    border-radius:10px; padding:9px 11px 9px 32px; font-size:13.5px; outline:none;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='15' height='15' fill='none' stroke='%239aa3b8' stroke-width='2' viewBox='0 0 24 24'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
    background-repeat:no-repeat; background-position:10px center;
  }
  .search input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
  nav{overflow-y:auto; padding:6px 10px 18px; flex:1; min-height:0}
  .group-label{font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--txt-faint); margin:16px 10px 6px; font-weight:600}
  .nav-item{
    display:flex; align-items:center; gap:9px; width:100%; text-align:left; cursor:pointer;
    background:transparent; border:0; color:var(--txt-dim); font:inherit; font-size:13.5px;
    padding:8px 10px; border-radius:9px; line-height:1.3; position:relative;
  }
  .nav-item:hover{background:var(--panel-2); color:var(--txt)}
  .nav-item.active{background:var(--accent-soft); color:var(--txt); font-weight:600}
  .nav-item.active::before{content:""; position:absolute; left:0; top:7px; bottom:7px; width:3px; border-radius:3px; background:var(--accent)}
  .nav-item .ni-title{flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .pill{font-size:9.5px; font-weight:700; letter-spacing:.04em; text-transform:uppercase; padding:2px 6px; border-radius:20px; white-space:nowrap}
  .pill.ok{background:var(--ok-soft); color:var(--ok)}
  .pill.warn{background:var(--warn-soft); color:var(--warn)}
  .pill.info{background:var(--accent-soft); color:var(--accent-2)}
  .sb-foot{padding:11px 16px; border-top:1px solid var(--line); color:var(--txt-faint); font-size:11px; display:flex; justify-content:space-between; align-items:center; gap:8px}

  /* ---------- content ---------- */
  .main{position:relative; overflow-y:auto; min-width:0; scroll-behavior:smooth}
  .progress{position:sticky; top:0; height:3px; background:transparent; z-index:30}
  .progress > i{display:block; height:100%; width:0; background:linear-gradient(90deg,var(--accent),var(--accent-2)); transition:width .08s linear}
  .topbar{
    position:sticky; top:3px; z-index:20; display:flex; align-items:center; gap:12px;
    padding:13px 28px; background:color-mix(in srgb,var(--bg) 82%,transparent);
    backdrop-filter:blur(10px); border-bottom:1px solid var(--line);
  }
  .topbar .crumb{font-size:12.5px; color:var(--txt-dim); flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .topbar .crumb b{color:var(--txt)}
  .iconbtn{background:var(--panel-2); border:1px solid var(--line-2); color:var(--txt-dim); width:34px; height:34px; border-radius:9px; cursor:pointer; display:grid; place-items:center; flex:none}
  .iconbtn:hover{color:var(--txt); border-color:var(--accent)}
  .navbtns{display:flex; gap:6px}
  .navbtns button{padding:0 11px; height:34px; gap:6px; width:auto; font-size:12.5px; align-items:center}
  .hamburger{display:none}

  .doc{max-width:792px; margin:0 auto; padding:34px 40px 120px}
  .doc-head{margin-bottom:26px; padding-bottom:18px; border-bottom:1px solid var(--line)}
  .doc-head .src{display:inline-flex; align-items:center; gap:7px; font-family:var(--mono); font-size:11.5px; color:var(--txt-faint); background:var(--panel); border:1px solid var(--line); padding:3px 9px; border-radius:7px; margin-bottom:12px}
  .doc-head h1.dt{font-size:27px; line-height:1.2; margin:0 0 6px; letter-spacing:-.01em}
  .doc-head .meta{color:var(--txt-dim); font-size:12.5px; display:flex; gap:14px; flex-wrap:wrap}

  /* markdown */
  .md{font-size:15.5px}
  .md h1,.md h2,.md h3,.md h4{line-height:1.25; letter-spacing:-.01em; scroll-margin-top:80px}
  .md h1{font-size:24px; margin:34px 0 14px}
  .md h2{font-size:20px; margin:38px 0 12px; padding-top:8px}
  .md h3{font-size:16.5px; margin:26px 0 8px; color:var(--txt)}
  .md h4{font-size:14px; margin:20px 0 6px; color:var(--txt-dim); text-transform:none}
  .md h2::before{content:""; display:block; height:1px; background:var(--line); margin:0 0 18px}
  .md p{margin:12px 0}
  .md ul,.md ol{margin:12px 0; padding-left:22px}
  .md li{margin:5px 0}
  .md li::marker{color:var(--accent)}
  .md strong{color:var(--txt); font-weight:680}
  .md hr{border:0; border-top:1px solid var(--line); margin:28px 0}
  .md a{border-bottom:1px solid transparent}
  .md a:hover{border-bottom-color:var(--accent-2); text-decoration:none}
  .md blockquote{margin:16px 0; padding:12px 16px; background:var(--panel); border-left:3px solid var(--accent); border-radius:0 10px 10px 0; color:var(--txt-dim)}
  .md blockquote p{margin:6px 0}
  .md code{font-family:var(--mono); font-size:.86em; background:var(--code-bg); border:1px solid var(--line); padding:1.5px 6px; border-radius:6px; color:var(--txt)}
  .md pre{background:var(--code-bg); border:1px solid var(--line); border-radius:11px; padding:15px 16px; overflow:auto; margin:16px 0; line-height:1.5}
  .md pre code{background:transparent; border:0; padding:0; font-size:12.8px; color:var(--txt-dim)}
  .tablewrap{overflow-x:auto; margin:18px 0; border:1px solid var(--line); border-radius:11px}
  .md table{border-collapse:collapse; width:100%; font-size:13.6px}
  .md thead th{background:var(--panel-2); text-align:left; font-weight:650; color:var(--txt); padding:10px 13px; border-bottom:1px solid var(--line-2); position:sticky; top:0; white-space:nowrap}
  .md td{padding:9px 13px; border-bottom:1px solid var(--line); vertical-align:top}
  .md tbody tr:last-child td{border-bottom:0}
  .md tbody tr:nth-child(even){background:color-mix(in srgb,var(--panel) 50%,transparent)}
  .md td code{font-size:.8em; word-break:break-all}
  .md img{max-width:100%}

  /* ---------- toc ---------- */
  .toc{border-left:1px solid var(--line); overflow-y:auto; padding:18px 16px; min-height:0}
  .toc .tl{font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--txt-faint); font-weight:600; margin:6px 8px 12px}
  .toc a{display:block; color:var(--txt-dim); font-size:12.5px; padding:5px 9px; border-radius:7px; border-left:2px solid transparent; line-height:1.35}
  .toc a:hover{color:var(--txt); background:var(--panel); text-decoration:none}
  .toc a.h3{padding-left:20px; font-size:12px}
  .toc a.active{color:var(--accent-2); border-left-color:var(--accent); background:var(--accent-soft); font-weight:600}
  .toc .empty{color:var(--txt-faint); font-size:12px; padding:8px}

  /* ---------- overview ---------- */
  .ov{max-width:920px; margin:0 auto; padding:34px 40px 120px}
  .hero{padding:26px 28px; background:radial-gradient(120% 140% at 0% 0%,var(--accent-soft),transparent 60%),var(--panel); border:1px solid var(--line); border-radius:18px; margin-bottom:22px}
  .hero .tag{display:inline-flex; align-items:center; gap:7px; font-size:11.5px; font-weight:600; color:var(--accent-2); background:var(--accent-soft); padding:4px 11px; border-radius:20px; margin-bottom:14px}
  .hero h1{font-size:30px; margin:0 0 8px; letter-spacing:-.02em; line-height:1.15}
  .hero p{margin:0; color:var(--txt-dim); font-size:15px; max-width:62ch}
  .statgrid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:13px; margin:22px 0}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:15px 16px}
  .stat .v{font-size:23px; font-weight:720; letter-spacing:-.02em; line-height:1}
  .stat .l{color:var(--txt-dim); font-size:12px; margin-top:7px}
  .stat .v.ok{color:var(--ok)} .stat .v.acc{color:var(--accent-2)} .stat .v.warn{color:var(--warn)}
  .ov h2{font-size:17px; margin:30px 0 4px; letter-spacing:-.01em}
  .ov .h2sub{color:var(--txt-dim); font-size:13px; margin:0 0 14px}
  .cardgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(248px,1fr)); gap:13px}
  .card{text-align:left; cursor:pointer; background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 17px; color:var(--txt); transition:border-color .15s,transform .15s}
  .card:hover{border-color:var(--accent); transform:translateY(-2px)}
  .card .ct{font-weight:640; font-size:14.5px; margin-bottom:5px; display:flex; align-items:center; gap:8px}
  .card .cd{color:var(--txt-dim); font-size:12.7px; line-height:1.5}
  .card .cg{font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--txt-faint); margin-bottom:9px; font-weight:600}
  .checks{background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:8px 6px}
  .chk{display:flex; gap:11px; padding:9px 13px; align-items:flex-start; border-bottom:1px solid var(--line)}
  .chk:last-child{border-bottom:0}
  .chk .ic{flex:none; width:18px; height:18px; border-radius:50%; display:grid; place-items:center; font-size:11px; margin-top:1px; font-weight:800}
  .chk.done .ic{background:var(--ok-soft); color:var(--ok)} .chk.pend .ic{background:var(--warn-soft); color:var(--warn)} .chk.gate .ic{background:var(--bad-soft); color:var(--bad)}
  .chk .ct{font-size:13.6px; font-weight:560}
  .chk .cs{font-size:12.3px; color:var(--txt-dim); margin-top:2px}
  .chk .tagx{margin-left:auto; flex:none}
  .addrtable{overflow-x:auto; border:1px solid var(--line); border-radius:13px; margin-top:6px}
  .addrtable table{border-collapse:collapse; width:100%; font-size:12.8px}
  .addrtable th{background:var(--panel-2); text-align:left; padding:9px 13px; border-bottom:1px solid var(--line-2); font-weight:620}
  .addrtable td{padding:8px 13px; border-bottom:1px solid var(--line); font-family:var(--mono); font-size:11.6px}
  .addrtable td:first-child{font-family:var(--sans); font-size:12.6px; color:var(--txt)}
  .addrtable tr:last-child td{border-bottom:0}
  .note{font-size:12.3px; color:var(--txt-faint); margin-top:10px}

  .fallback{background:var(--warn-soft); border:1px solid var(--warn); color:var(--warn); padding:12px 15px; border-radius:11px; margin-bottom:18px; font-size:13px}

  ::-webkit-scrollbar{width:10px;height:10px}
  ::-webkit-scrollbar-thumb{background:var(--line-2); border-radius:10px; border:2px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:var(--txt-faint)}

  /* ---------- responsive ---------- */
  @media (max-width:1180px){ .app{grid-template-columns:var(--sb) minmax(0,1fr)} .toc{display:none} }
  @media (max-width:820px){
    .app{grid-template-columns:1fr}
    .sidebar{position:fixed; z-index:60; width:86%; max-width:320px; height:100vh; transform:translateX(-100%); transition:transform .22s ease; box-shadow:0 0 60px rgba(0,0,0,.5)}
    body.nav-open .sidebar{transform:none}
    .scrim{position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:55; opacity:0; pointer-events:none; transition:opacity .2s}
    body.nav-open .scrim{opacity:1; pointer-events:auto}
    .hamburger{display:grid}
    .doc,.ov{padding:24px 20px 100px}
    .navbtns .lbl{display:none}
  }
</style>
</head>
<body>
<div class="scrim" data-close-nav></div>
<div class="app">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <h1><span class="dot"></span> DemoThemis</h1>
      <div class="sub">Grant Review Portal · World Foundation</div>

    </div>

  <!-- CONTENT -->
  <main class="main" id="main">
    <div class="progress"><i id="bar"></i></div>
    <div class="topbar">
      <button class="iconbtn hamburger" id="hamburger" title="Menu" aria-label="Menu">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
      </button>

        <button class="iconbtn" id="prev" title="Previous (←)"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg></button>

<!-- ====== OVERVIEW (custom dashboard) ====== -->
<template id="tpl-overview">
  <div class="ov">
    <div class="hero">
      <span class="tag">● Full-v1 request · recovery redeploy pending</span>
      <h1>Everything assembled for the grant, in one place</h1>
      <p>DemoThemis is a decentralized arbitration court whose jury is gated by <b>on-chain World ID</b> — one verified human, one vote, instead of one dollar, one vote. The point isn't just Sybil-resistance: where a stake-weighted oracle (UMA, Kleros) is bought once — acquire a majority of the stake and you decide this case and every future case for free — DemoThemis draws each panel at <b>random, after the question is posed</b>, from the whole verified-human pool. There's no known set of jurors to buy, so to swing a specific verdict you'd have to pre-corrupt a near-majority of the <b>entire pool</b>, re-pay it for <b>every case</b>, and still only get a <i>probability</i> — one that collapses as the pool, the case volume, and the value at stake grow. The historical mainnet instance is source-verified, but an exact-3/3 liveness review found both a no-show stall and a party-exclusion first-draw lock. Eligible-party preflight, bounded first-draw fee/principal unwind, and bounded retry are implemented in source; the capstone is paused pending a fresh deployment. This portal collects the full application, priced milestone plan, positioning, independent diligence, and on-chain evidence. Pick a card or use the sidebar.</p>
    </div>

    <div class="statgrid">
      <div class="stat"><div class="v ok">6</div><div class="l">source-verified mainnet contracts</div></div>
      <div class="stat"><div class="v">95</div><div class="l">Foundry tests (party exclusion + first draw + retry + invariants + fuzz)</div></div>
      <div class="stat"><div class="v ok">89.51%</div><div class="l">line coverage (court 96.43% · registry 100%; functions 92.22%)</div></div>
      <div class="stat"><div class="v acc">$50k</div><div class="l">3-month production-ready v1</div></div>
      <div class="stat"><div class="v warn">0</div><div class="l">jurorCount() — capstone not yet run</div></div>
    </div>

    <h2>What's in here</h2>
    <p class="h2sub">Eleven review artifacts, grouped. Links between them stay inside this portal.</p>
    <div class="cardgrid" id="ov-cards"></div>

    <h2 style="margin-top:34px">Status — what's left before submission</h2>
    <p class="h2sub">From the independent review's critical path. Green = done · amber = pending the capstone · red = hard eligibility gate.</p>
    <div class="checks">
      <div class="chk done"><span class="ic">✓</span><div><div class="ct">Milestones priced + budget written</div><div class="cs">One $50k request funds M1–M6 through reviewed, integration-ready v1; M6 verified-human testing is the final launch gate.</div></div><span class="tagx pill ok">done</span></div>
      <div class="chk done"><span class="ic">✓</span><div><div class="ct">Application copy written</div><div class="cs">12 sections, leads with on-chain World ID, hardened by a 4-lens reviewer panel.</div></div><span class="tagx pill ok">done</span></div>
      <div class="chk done"><span class="ic">✓</span><div><div class="ct">Deployment-JSON honesty leak fixed</div><div class="cs">Stale "3 real humans register here" line reconciled to jurorCount()==0.</div></div><span class="tagx pill ok">done</span></div>
      <div class="chk pend"><span class="ic">◷</span><div><div class="ct">Deploy and cut over the automated court release</div><div class="cs">Fresh registry/court/escrow addresses, source verification, court v2 + registry v1 + automated timing v1 checks, all seven capability flags, app + keeper selection, and World Developer Portal permissions are required before jurors register.</div></div><span class="tagx pill warn">pending</span></div>
      <div class="chk pend"><span class="ic">◷</span><div><div class="ct">Run the three-seat / at-least-four-human mainnet capstone</div><div class="cs">Run only on the liveness-enabled replacement; four eligible humans provide one pre-draw withdrawal reserve while three seats decide the case.</div></div><span class="tagx pill warn">blocked</span></div>
      <div class="chk pend"><span class="ic">◷</span><div><div class="ct">Record the demo video + fill the trace table</div><div class="cs">Best filmed during the capstone, then a 5-minute paste.</div></div><span class="tagx pill warn">pending</span></div>
      <div class="chk done"><span class="ic">✓</span><div><div class="ct">Public repository</div><div class="cs">The MIT-licensed repository is public; keep final traces and video links current.</div></div><span class="tagx pill ok">done</span></div>
      <div class="chk gate"><span class="ic">!</span><div><div class="ct">Confirm eligibility, KYC, sanctions, tax residency + payout mechanics</div><div class="cs">Location facts recorded: one UK resident; one Baltimore, Maryland work-visa resident. The current grants disclaimer restricts U.S. residence/location, so obtain written Foundation guidance and do not infer an eligible structure.</div></div><span class="tagx pill warn">gate</span></div>
    </div>

    <h2 style="margin-top:34px">Legacy deployment on World Chain mainnet (chain 480)</h2>
    <p class="h2sub">Source-verified historical v4 preview-verifier instance; it is not the production dependency, and eligible-party preflight, first-draw unwind, and quorum recovery are not deployed here. Do not use these addresses for the capstone. The replacement uses the documented mainnet Router. MockUSD is valueless.</p>
    <div class="addrtable">
      <table>
        <thead><tr><th>Contract</th><th>Address</th></tr></thead>

# DemoThemis — World Foundation grant application for a production-ready v1

## 1. Summary

**DemoThemis is a decentralized arbitration court where every juror seat is gated by a
World ID proof verified _on-chain_ through the documented mainnet Router — the Groth16 proof is checked inside the registration
transaction, and a reused human reverts. One verified human, one juror seat; not one dollar,
one vote. A historical v4 preview-verifier court is deployed and source-verified on World Chain mainnet; it is evidence, not the production dependency. An exact-3/3 liveness review found both a no-show stall and a party-exclusion/first-draw lock; both recoveries and the Router gate are now implemented in source, and a replacement deployment is required before the live capstone.** It is, to our
knowledge, the first dispute-resolution Mini App in World App, and the first arbitration court
to seat its jurors by personhood rather than capital (dated 2026-06-20 scan — see §6).

## 2. The problem

Every marketplace, P2P trade, freelance deal, and online service needs a way to settle
disputes. Today that means a centralized operator (a trust bottleneck) or a *decentralized*
court that decides by money. The two live decentralized courts decide by capital: **Kleros**
draws jurors in proportion to PNK **stake** (stake-weighted sortition), and **UMA's** DVM is a
**one-token-one-vote** oracle with no jury draw at all. Either way, influence tracks tokens, so
a well-capitalized actor can **buy a verdict** and reuse the position case after case. That is
the exact failure World ID was built to fix for voting — and nobody has applied it to
adjudication. Inside World App there is **no dispute-resolution primitive at all**,
so every marketplace flow runs its own siloed, operator-run dispute desk.

## 3. The solution

DemoThemis replaces *stake-weighting* with *personhood*. A juror joins by verifying with
the **World ID mainnet Router** (the Groth16 proof is checked inside the registration transaction)
and posting a small bond; the sybil gate gives **one human one seat on every wallet**. For each
case a panel is drawn **at random, after** the question is fixed — so an attacker cannot know
or choose who will sit on it. Jurors vote and the majority decides, with the fee split and the
settlement enforced atomically on-chain. Because seats are random verified people, not coins,
there is no panel to buy: to land a bribed majority on a specific case you must pre-corrupt a
near-majority of the **entire human pool** and merely hope the draw seats enough of them — for
only a *probability*, not certainty. Cost-to-capture therefore scales with **pool width**
(fraction needed × pool size × bribe-per-human), and because every case re-draws a fresh
random panel, **nothing carries over — you pay the whole pool-corruption cost again, per
case**, while high-value cases add parallel panels and appeals that raise the bar further (§7).
Unlike out-staking a stake-weighted oracle once and deciding every case for free, influence
here is not targetable, not reusable, and does not amortize.

Two case types ship today: an **escrow dispute** (fund a deal, raise a dispute, the court
decides who gets paid, settlement is atomic) and a **yes/no question** (the neutral resolver
surface). Three surfaces, one Next.js app: the **World App Mini App** (the live juror flow), a
**pure-browser sandbox** that simulates the full mechanism (so a reviewer needs no wallet), and
a read-only **scale cohort**.

The yes/no question type is the neutral resolver surface. Any World App, escrow flow,
marketplace, DAO, or data product can route a well-defined question to the court and receive a
personhood-resolved on-chain answer. **M4 funds the resolution SDK and a neutral reference
integration** that proves this path end to end. The grant completes DemoThemis itself: a stable,
general resolution interface that future applications can build against without waiting for
another court milestone or grant.

> **Honest scope note (carried through this application):** the recommended replacement mainnet design runs
> a **3-seat panel with a minimum eligible pool of 4 and no pool maximum**. Three remains fund-safe
> in the contract because an undrawn case can unwind, but has no one-withdrawal adjudication reserve.
> At four the random draw excludes only one juror, so it still does little security work; additional verified humans
> remain welcome as liveness reserves, while production-scale pool recruitment is
> still M3b and M1 hardens randomness. The real
> capture-resistance — where flipping a verdict costs more as the pool grows, across parallel
> panels — is funded roadmap, not the planned three-seat / minimum-four capstone. We say this up front rather than let a
> reviewer find it in the contract.

## 4. Why World — deep, on-chain World ID usage *(the core of the application)*

This is not "we call IDKit." World ID is the **load-bearing primitive of the mechanism**, used
on-chain and across the stack:

- **On-chain World ID Router.** `WorldIDRouter.verifyProof` runs the **Groth16 check inside the
  registration transaction**, not as a cloud callback. The app requests the supported v3
  compatibility proof while the World ID 4.0 verifier remains preview.
- **Sybil gate.** The identity-derived nullifier gives one human one seat; a reused human
  **reverts on-chain**. This is what makes "one human, one vote" real.
- **Wallet-bound proofs.** The proof is bound to the registering wallet (`signalHash`
  recomputed on-chain), so a **stolen or replayed proof reverts** before the check.
- **MiniKit walletAuth (SIWE)** for the juror session; **Permit2 single-tap onboard** (verify +
  faucet + bond in one sponsored batch, because World App auto-revokes plain ERC-20 approvals);
  **sponsored gas** so verified humans pay nothing; **deep-link** straight to a case.
- **Open, permissionless onboarding.** Any Orb- or Device-verified human can juror — no wealth
  gate, no exam — so the bench scales to capable people anywhere, not just the well-capitalized
  (World's inclusion mission, applied to *who gets to judge*; juror quality-scoring is funded M3b).

World ID isn't a login here — it gates juror eligibility by personhood, not
capital. That is why we lead with it: the grant's most-valued axis is the project's
central mechanism, not a feature.

## 6. Differentiation — and the expert rebuttals, handled

Decentralized arbitration is a real, respected category; we don't claim to have invented it. We
claim one defensible inversion — **the eligibility set for the juror draw**:

- **The draw is not the novelty; the eligibility set is.** Kleros already draws jurors randomly
  and post-question (so did Aragon Court, before it was deprecated) — so randomness isn't our
  claim. What we change is *who is eligible to be drawn*: bonded **stake** (them) vs
  **one-verified-human-one-seat** (us).
- **The live decentralized courts decide by capital.** Kleros sortition ∝ PNK stake; UMA is
  one-token-one-vote; Aragon Court (now deprecated — Aragon wound the project down) seated
  stake-/activation-based "guardians." Tellingly, even **Kleros's "Humanity Court,"** which rules
  on *who is a unique human*, still seats its **jurors by stake** — the registry is
  personhood-gated, the bench is not. DemoThemis gates the **bench**.
- **"But World ID is itself a sybil/dedup primitive — isn't this just a better sybil gate?"**
  Yes, and that is the point. Prior personhood systems (Proof-of-Humanity and descendants) gate
  *who may stake*; influence is still drawn by capital. Putting personhood at the **draw
  itself** is the novel step, and World ID is the first production-grade primitive that makes a
  personhood-gated eligibility set **cheap and sybil-hard**.
- **Inside World:** a June 2026 scan of the World App catalog and **every** Community Grant
  recipient (Wave 0 + Wave 1) found **no** dispute-resolution, arbitration, juror, or escrow
  project — the closest funded work is one-human-one-vote *governance/voting* (Wonderland,
  Votexx, zkSnap, Agora, World Poll), which makes collective decisions, not two-party
  adjudications with bonds, evidence, and settlement.

We scope the "first" claims honestly: "to our knowledge," "in the World ecosystem," from a dated
2026-06-20 scan — not an exhaustive crawl. Full scan: [docs/DIFFERENTIATION.md](DIFFERENTIATION.md).

## 7. Security model — stated honestly

What's bought today, and what isn't:

- **The MVP ballot is receipt-_ful_.** Commit/reveal lets a juror reveal their vote — and the
  secret salt that hid it — to *prove* how they voted, so the **MVP is vote-buyable in principle** — at the minimum 3/3 pool size a briber
  needs only the two known jurors and can verify compliance. At scale the personhood gate changes
  the attack entirely: because the panel is drawn at random after the question, there is no known
  set to buy, so a briber must pre-corrupt a near-majority of the **whole pool**, per case, for
  only a chance — and **receipt-free MACI-style
  ballots (M2)** remove even their ability to *verify* that corruption paid off. The court is un-buyable only with
  **both** — which is why M2 is the single highest-priority mechanism upgrade after the
  liveness-enabled replacement is deployed and proven.
- **Capture-resistance scales with pool width, case volume, and the stakes — and that is roadmap, not the three-seat demo.** Because the panel is drawn at random after the question, an attacker can't target it; to even attempt a flip they must pre-corrupt a near-majority of the whole pool and hope the draw cooperates. So the price tracks **pool width × case volume × value-at-stake**, never a flat panel bribe: widen the pool and a fixed budget's flip-probability collapses (in the sandbox, bribing ~19.2% of a 200k pool buys only a ~2.91% chance to flip a single panel); raise the stakes and several **independent parallel panels must all agree**, so odds multiply pᴺ — the chance of flipping collapses from ~1/5 to 1/125 to 1/3000 as panels go 1→3→5 (M3b) — while any captured panel is **appealed into a larger one (7→15→31)**, forcing re-capture at higher cost; and because every case re-draws, **none of it amortizes — the attacker pays again, per case**. The planned replacement three-seat / minimum-four capstone is a
  liveness/cost demo (where a small bribe can still flip the toy panel); it is **not** this
  security regime. The hard part — provable, sybil-resistant on-chain personhood at the juror
  draw — is **shipped**; widening it is funded engineering, not new research.
- **No admin override — an affirmative trust asset, verifiable from the source-verified
  bytecode.** No upgradeability, no pause, no fund-extraction path, no override of any in-flight
  case. The only privileged calls are `setEscrow`/`setCourt`: one-shot deployment wiring that
  reverts forever after it is set. Commit and reveal durations are immutable deployment
  parameters with a five-minute on-chain minimum; there is no duration setter. Drawing,
  timeout recovery, and resolution are permissionless.
  `RewardPool` has no payout function in the MVP.
- **Quality is measured privately, not assumed (M3b).** Funded juror reputation pays **accuracy above an
  obvious-vote baseline** — leave-one-out scoring, a lenient Wilson-interval suspension gate,
  draw rate capped at 3× a newcomer — while exact scores, case histories, payments, penalties,
  and refunds remain private. Jurors prove only an eligible reputation band and correct private
  updates; the public sees aggregate accounting. This rewards being *right*, not merely agreeing, designing
  out the consensus-collapse/herding failure that stake courts share while protecting honest
  dissent. Panel sizes (7→15→31) follow the **Condorcet jury theorem**: odd panels of
  better-than-chance humans converge on the truth as they grow. This scoring is interactive today
  in the /sandbox reputation demo.
- **Open edges, named (the honesty rule applied to attacks).** Two the MVP does not yet close: *ambiguous
  questions* — today a tie or post-panel no-quorum resolves to status quo (question NO / escrow refunds the
  payer), so a genuinely unanswerable question defaults to NO; an explicit **Invalid/void
  outcome**, flagged when independent parallel panels split on a genuinely ambiguous question,
  is funded in M3b. And *credential rental or an unavailable juror* — M3b adds a World ID-based
  per-draw presence check plus a decline-and-replace protocol path, so jurors serve only when
  they are present and assess themselves as capable; M6 hardens and tests that user flow. Both
  gaps are part of this grant's completion scope, not deferred to an unspecified later build.

## 10. Sustainability & go-to-market

DemoThemis stays what §1 calls it — a **personhood-gated arbitration court** — and this section is
about how the completed court becomes self-sustaining. Two fees are built in already: a **2%
escrow fee** (retained only when a deal is disputed; refunded on a clean release) and a **flat 20
MUSD per-question case fee**. Both are split 70/20/10 (jurors / reward pool / protocol) in the
replacement source using **valueless test tokens, so there is no real fee revenue yet** (`jurorCount() == 0` until
the capstone). The meter exists; what it lacks is a production-ready court and repeatable case
flow.

A juror court is a **two-sided system**: it needs verified jurors *and* a steady stream of cases,
and it is useless empty. The cold-start plan therefore starts with the broadest grant-safe
surface: a **resolution SDK** that lets any World App route a well-defined question or disputed
deal to the court, plus a neutral reference integration that proves both paths end to end.
Escrow disputes are naturally sparse; reusable question resolution gives the court additional
case flow to test juror reliability, show earnings, and build public history.

The grant deliverable is entirely DemoThemis: the court, juror system, open SDK, documented API,
source-verified settlement paths, stable lifecycle events, and explorer-traced outcomes. The
reference integration exists only to prove that an independent consumer can open a case, follow
its draw, ballot, and appeal lifecycle, receive YES, NO, or INVALID finality, and execute an optional
escrow ruling. The same interface can serve marketplaces, DAOs, service-level disputes,
community decisions, and any World App that needs a credibly neutral result.

That case flow compounds in two ways. First, every completed court case contributes to one shared
juror-quality record through difficulty-adjusted agreement, consistency with its written criteria,
and appeal survival; independently checkable outcomes can add later confirmation. The same volume
that funds the bench also calibrates it (the §7 reputation scoring, live in the /sandbox demo).
Second, the SDK makes adoption modular:
external apps do not need to build their own dispute desk, juror pool, World ID proof path, or
settlement contracts. They can call the court and inherit the public resolution history.

So the sustainability claim is simple: **this grant completes the reusable court; fee volume
supports it afterward**. The 2% disputed-escrow fee and flat per-question fee are already modeled
on-chain in valueless tokens; M4 makes both case types easy to integrate, and M6 verifies that
real humans reliably complete the juror loop that earns those fees.

# DemoThemis production-ready v1 — World Foundation grant budget & timeline

The post-MVP build the grant funds, priced bottom-up and tied to verifiable acceptance
criteria. The MVP is already built and source-verified on World Chain mainnet at the
founders' own expense. This single grant funds the complete path from *honest single-panel
demo* to a *VRF-randomized, receipt-free, appeal-laddered, independently-reviewed,
integration-ready* court. No core security, finality, juror-safety, or SDK milestone is deferred
to a later grant. The roadmap ends with **moderated verified-human testing**, because whether
real humans complete the juror loop is what decides if the court works at all.

> ## The ask
>
> **Grant requested: US$50,000** for milestones **M1–M6**, delivering the complete
> production-ready DemoThemis v1 in approximately **three months**: verifiable randomness,
> receipt-free ballots, work-based quotes, private rewards and reputation, expanding
> appeals, parallel panels, an Invalid/void outcome, a stable resolution SDK, an independent
> review of the completed protocol, per-draw presence and juror replacement, and moderated
> verified-human testing.
>
> **Where the money goes:** AI-assisted development is now the cheap part, so the build
> milestones are lean and the savings go into the human-intensive work AI does *not* cheapen —
> **moderated user testing & UX (M6, US$13,000, the biggest line)**, the true test of whether
> verified humans will juror through the court.
>
> **Delivered by two co-founders working in parallel** in **~3 months**, at the same
> person-effort and cost as a longer solo build (see *Why the budget holds at half the
> timeline*, below).
>
> Every tranche is released only on its acceptance criteria (each an on-chain or repo-
> verifiable artifact); **no upfront tranche**, clawback-compatible. Disbursed in **WLD** at
> the tranche-date rate per the grant agreement.

## Pricing method (stated so the numbers are auditable)

- **Labor is priced in person-effort, not calendar time** — a blended **US$2,200 /
  person-week** (≈ US$55/hr), well below market senior-Solidity contractor rates
  (US$150–250/hr). The two co-founders are mission-aligned and the grant funds focused build
  time, not agency overhead. The MVP — 6 legacy source-verified mainnet contracts and a
  100-test Foundry suite (including Router binding/rejection, exact-3/3 party-exclusion, first-draw unwind,
  and no-show recovery regressions; the prior 95-test liveness snapshot measured 89.51% line coverage), a full browser sandbox, and the on-chain World ID
  Router path (with the earlier v4 preview experiment preserved separately) — was
  **shipped solo by the founder in ~1 month of focused effort**, which is the capital-efficiency
  evidence behind this rate; the funded roadmap is split across **both co-founders** to deliver
  in parallel.
- **Development is the cheap part; user testing is where the money goes.** AI-assisted
  development compresses each build milestone, so the engineering lines are small
  and the **largest single line is M6 — moderated user testing & UX ($13k)**, which AI does not
  make cheaper (it is human time: recruiting World ID-verified testers, running sessions on real
  phones, instrumenting drop-off, and iterating). The cap is held at **US$50,000** by the

## Why the budget holds at half the timeline

**The budget prices person-effort, not calendar time** — ~15 person-weeks of work plus a fixed
third-party audit. That work does not get cheaper by finishing sooner: the same milestones are
delivered, just concurrently. DemoThemis is built by **two co-founders working in parallel**,
which compresses the same ~15 person-weeks into roughly **half the calendar at the same total
cost**.

For the Foundation this is **strictly better at an identical price**: the live, audited,
human-on-chain court — and every later milestone — lands sooner, the grant's capital is deployed
faster, and the **clawback-exposure window is shorter**. The rate stays the lean
**$2,200/person-week** — two mission-aligned builders, no agency overhead, no PM markup; we are
not charging for the parallelism, only delivering it.

One honest caveat: the one element that is **calendar-bound rather than team-bound** is the
external security review (M5). It begins after the funded on-chain surface from M1–M3b is frozen
and overlaps the SDK, remediation, and testing work; two builders do not make the reviewer work
faster. The two-person team also directly **de-risks the bus-factor** concern a solo-founder
application raises.

## Timeline

The complete roadmap finishes in **~3 months** from grant-agreement signing — roughly half the
calendar of a solo build at identical person-effort. Illustrative anchor: signed **July 2026** →
production-ready v1 accepted in **October 2026**.

## Milestone detail (deliverable → acceptance criteria → cost)

Each milestone discharges against an **on-chain or repo-verifiable artifact**, in the same
self-evidencing style as the MVP (source-verified contracts + explorer traces, not prose).
With two builders, M1 is split (randomness on one track, the correctness-hardening items on the
other); one co-founder then drives M2 while the other drives M3a/M3b; both freeze the reviewed
surface, complete M4, remediate M5 findings, and run M6 testing jointly.

### M1 — VRF/drand draw randomness + core hardening — **$4,000** (Weeks 1–2)

**Deliverable.** Replace the MVP's `blockhash`-seeded two-step draw (a documented,
sequencer-influenceable stand-in) with a verifiable randomness source (drand beacon or
Chainlink VRF on World Chain), and land the remaining correctness hardening surfaced by the MVP's
own pre-submission review. The replacement-source baseline already rejects cases with too few
eligible jurors before funds/state lock and gives every accepted case a fixed, permissionless
first-draw unwind that refunds the unused fee and escrow principal; M1 must preserve and re-verify
those invariants while adding:

- a registry **partial-slash guard** (deactivate a juror whose bond drops below the full bond)
  so the "active juror is always fully bonded" invariant holds independent of the caller;
- zero-address guards on the one-shot wiring functions;
- a pre-onboard **forged-proof check against the documented World ID Router**, captured as a
  trace — proving the replacement `WorldIDRouterGate` fails closed before the human run.
  The older verifier-return assumption remains only in the archived v4 preview adapter.

**Acceptance criteria.** New randomness contract deployed and **source-verified** on World
Chain; a panel-draw trace whose seed is the published beacon/VRF output; expanded Foundry suite
(including the existing escrow preflight/unwind regressions and a new partial-slash test) green
at >90% coverage; the
Router forged-proof revert trace in `docs/DEMO.md`.

**Cost.** 1.5 person-weeks ($3,300) + $700 (VRF subscription / mainnet gas). AI-assisted, split
across both builders — under a calendar week.

### M2 — Receipt-free ballots, MACI-style v1 — **$8,000** (Month 2)

**Deliverable.** Replace commit/reveal (which can *prove* how a juror voted, so it is
vote-buyable in principle — the MVP's own notes call it a "known-insufficient stand-in") with
receipt-free ballots: encrypted votes with a bonded coordinator, hiding both juror identity and
vote. **Scope is integration, not new cryptography** — built on an existing audited MACI library
plus the bonded-coordinator wrapper and the court tally adapter, which keeps the band tight. Driven by one co-founder in parallel with M3a/M3b.

**Acceptance criteria.** Encrypted-ballot contracts source-verified on mainnet; an end-to-end
resolved case where the explorer shows **no juror's vote is publicly linkable before or after the tally**, including through a payment, penalty, refund, reputation update, or reusable pseudonym; a
written threat-model note on the coordinator bond; encrypt → tally → resolve tests green. The
completed ballot and private-accounting surface is included in M5's independent review.

**Cost.** 3.5 person-weeks ($7,700) + $300 (MACI tooling and integration infrastructure).

### M3a — Work-based quote engine + reward-pool cyclic payout — **$4,000** (Months 2–3)

**Deliverable.** A **work-based quote engine** that locks processing, expected panel work,
reserve top-up, and capped operations into each accepted case price, plus the **reward-pool
gated cyclic payout** (recency-weighted private distribution to active jurors, with only the
aggregate and its correctness proof public), turning today's passive sink into a working juror incentive.

**Acceptance criteria.** Each feature deployed and source-verified, each with an explorer trace
(a quote whose locked inputs and cap reproduce its charged total; a proved aggregate reward-pool distribution that does not expose an individual juror's amount).

**Cost.** 1.5 person-weeks ($3,300) + $700 gas/infra.

### M3b — Reputation, appeals, panels, Invalid/void + juror liveness — **$6,000** (Month 2)

**Deliverable.** **Private juror reputation commitments** (leave-one-out, Wilson-gated,
draw-rate capped at 3× a newcomer, with exact scores, case histories, penalties, and refunds
hidden); the **appeal ladder** (7→15→31 seats); **parallel pᴺ panels** above a configured risk
line; an explicit **Invalid/void** final outcome for ambiguous or unanswerable cases; a World
ID-based **per-draw presence check**; and a deterministic decline-and-replace path for jurors
who do not assess themselves as capable. This is the milestone that turns the live demo's
single 3-seat panel into the intended capture-resistant, live, and integration-safe finality
model.

**Acceptance criteria.** Each sub-feature deployed and source-verified, with explorer traces for
a draw proved from a private eligible reputation band, an appeal that expands the panel and
privately reverses a vindicated juror's update, parallel panels that must agree, and a divided or
unanswerable case that finalizes INVALID rather than defaulting to NO, and a timely decline that
replaces a juror without slashing them or deadlocking the case. Public data exposes only
one-case pseudonyms, required proofs, and aggregate accounting. Sandbox numbers and on-chain
behavior are reconciled.

**Cost.** 2.5 person-weeks ($5,500) + $500 gas/infra.

### M4 — Stable resolution SDK + neutral reference integration — **$5,000** (Months 2–3)

**Deliverable.** A versioned TypeScript **resolution SDK** and documented API so any World App
can open a well-defined question or disputed deal, follow draw, ballot, and appeal
states, receive YES, NO, or INVALID finality, and optionally execute an escrow ruling. A neutral
reference integration proves the full path on mainnet. The SDK includes stable events,
idempotent reads, error handling, integration examples, and a migration policy so an external
application can build against DemoThemis without depending on unfinished court work.

**Acceptance criteria.** Published versioned SDK (npm + docs) and a reference integration that
resolves at least one personhood-resolved question and one disputed deal through DemoThemis on
mainnet, with transaction and finality traces on the explorer. Contract tests cover YES, NO,
INVALID, appeal, timeout, replacement, and idempotent status reads.

**Cost.** 2.0 person-weeks ($4,400) + $600 (infra / integration).

### M5 — Independent review of the completed protocol — **$10,000** (Months 2–3, pass-through)

**Deliverable.** A third-party security review of the complete funded on-chain court after
M1–M3b freeze its security surface: the five core contracts, World ID gate, verifiable
randomness, receipt-free ballot adapter, private consequence accounting, work-based quote engine,
reward distribution, reputation, appeals, parallel panels, INVALID finality, per-draw presence,
decline/replacement, and the SDK-facing contract interface. The MVP **claims no audit anywhere**; this funds the independent review of
the version that will actually serve verified humans and external applications.

**Acceptance criteria.** Published report (or public summary plus full resolved-findings log)
linked from the repository; every critical and high-severity finding resolved and retested;
final reviewed commit and deployed source-verified addresses recorded in `docs/DEMO.md`.

**Cost.** $10,000 third-party pass-through, subject to a final written quote before submission.
The team owns scheduling and remediation; payment is tied to the published review artifact and
resolved critical/high findings.

### M6 — Juror UX hardening + moderated presence/replacement testing — **$13,000** (final launch gate)

**Deliverable.** Integrate the reviewed M3b presence and decline/replacement protocol paths into
a clear juror experience, then run moderated sessions with real World ID-verified jurors through
onboard → presence → accept/decline → private vote → return-to-finalize → payout. Instrument
completion and drop-off at every step, fix the friction the sessions expose, and complete an
accessibility pass (non-color state cues, clear phase timers, recovery and redirect handling).
The three-seat capstone with at least four eligible humans is juror-test #0; this milestone scales it into iterative production-
readiness rounds.

**Acceptance criteria.** ≥2–3 moderated rounds with verified humans; measured juror-flow
completion, decline/replacement success, and return-to-finality rates with a before/after report;
resulting UX fixes shipped to the live Mini App without changing the reviewed court security
surface; completed accessibility checklist.

**Cost.** 4.0 person-weeks ($8,800) + $4,200 (participant recruitment + incentives across rounds
+ test devices). The pass-through is large *on purpose* — recruiting and paying real verified
testers is the human cost AI cannot remove, and it is the most decisive spend in the plan.

## Sustainability past the grant

The grant is **one-time and milestone-gated**; it does not fund operations indefinitely. The court is fee-bearing by construction — a **2% escrow fee** (retained only when a deal is disputed; refunded on a clean release) and a **flat 20 MUSD per-question case fee** — two distinct mechanisms, both split 70/20/10 (jurors / reward pool / protocol) in the replacement source, using valueless test tokens. **There is no real fee revenue yet** (`jurorCount() == 0` until the capstone), and a fee with no case flow earns nothing — so the cold-start question is where the *cases* come from.

The constraint is that a juror court is **two-sided**: it needs jurors and a steady stream of
cases. Disputes are sparse and reactive because they occur only when something goes wrong. M4
therefore funds a reusable **resolution SDK** and neutral reference integration so well-defined
questions can provide additional case flow through the same court that settles disputed deals.

The completed grant deliverable is a general court, not a consumer application. It does not
depend on any one customer: the same versioned interface serves escrow flows, marketplaces,
DAOs, service-level disputes, community decisions, and other World App products that need a
credibly neutral result. Stable lifecycle events and YES, NO, or INVALID finality let those
applications begin integration without waiting for another DemoThemis build phase.

Illustrative unit economics remain simple and grant-safe: at the **2% escrow fee** a $1,000
disputed deal yields ~$20 across the 70/20/10 split, and each resolved question carries the
**flat 20 MUSD case fee** on the same split. A few dozen resolved cases/month would cover a
maintenance person-week. **The requested grant completes the reusable court; fee volume, not a
follow-on build grant, is the path to sustaining it.**

## Payout mapping (how this lands on the grant's mechanics)

- **No upfront tranche.** Each milestone is paid on its acceptance criteria — the Foundation's
  exposure is never more than one milestone ahead of delivered, verifiable work.
- **WLD at the tranche-date rate**, per the grant agreement; USD figures above are the basis.
- **Clawback-compatible.** Every tranche is tied to an on-chain, repository, test, user-research,
  or independent-review artifact, so non-delivery is objectively checkable. The team owns every
  milestone and is responsible for commissioning M5 and resolving its findings.
- **Eligibility must be confirmed before submission.** DemoThemis has two co-founders: one is a
  United Kingdom resident and the other is based in Baltimore, Maryland, United States on a work
  visa. The current World Foundation Grants page restricts grants involving United States
  residence, location, incorporation, or registered agents. This draft therefore does not assume
  that any signatory, entity, or payout arrangement is eligible. The team will obtain written
  Foundation guidance and then provide exact citizenship, residence, tax, sanctions/export-
  control, KYC/AML, entity, signatory, and payout-recipient information. The academic advisor
  remains a team member only.

# Differentiation scan + paragraph (§10 task a)

The honest competitive positioning for the grant application — backed by a dated,
sourced scan of the World App catalog, the World/Worldcoin grant recipients, and the
decentralized-arbitration category. Pairs with the verified UMA/Kleros/centralized
comparison in [PITCH_REVIEW.md](PITCH_REVIEW.md) and the storyboard.

---

## The scan (2026-06-20)

**1. Grant RFPs / focus areas.** World's grant programs are **Spark** (early-stage
Mini Apps), **Scale** (growth), and **Developer Rewards** (usage-based). The page
names **no RFP topic or category** for dispute resolution, arbitration, escrow, or
trust infrastructure — use cases are open-ended under the broad themes of "digital
identity, global financial inclusion, and collaborative infrastructures."
→ *DemoThemis is a net-new capability, not an entry in a crowded, named category.*
Source: [world.org/grants](https://world.org/grants).

**2. Past grant recipients (Wave 0 ≈28 + Wave 1 ≈16, ~44 funded projects).** **None**
is a dispute-resolution system, arbitration court, juror mechanism, or escrow
protocol. The closest funded work is **one-human-one-vote governance / voting**:
- Wave 0 — *Clade Club* (merit-weighted DAO voting), *TheVoice* (majority/quadratic/
  conviction voting), *Votexx* (coercion-resistant voting), *Wonderland* (Sybil-proof
  voting, orb-verified addresses only), *Wallfacer / POPGDP* (sybil-resistant grant
  voting).
- Wave 1 — *zkSnap* (private voting), *Agora* (governance framework), *World Poll*
  (incentivized global polling).

These make **collective decisions**; none adjudicates a **two-party dispute** with
bonded jurors, evidence, and a binding settlement. Sources:
[Wave 1 recipients](https://world.org/blog/announcements/meet-worldcoin-wave1-community-grants-recipients) ·
[Wave 0 recipients](https://world.org/blog/world/worldcoin-builders-wave0-grant-recipients-advancing-tech-tree).

**3. World App Mini App catalog.** 150+ Mini Apps as of early 2025 (≈$8.8M WLD
transacted); the scan surfaced no dispute-resolution/arbitration app. P2P-trading and
marketplace flows exist (and use their own siloed, operator-run dispute desks) — these
are **potential customers** of a neutral court, not competitors.

**4. Decentralized arbitration as a category (off-World).** Live and respected, but
**capital-weighted**: Kleros selects jurors by **PNK stake** (sortition ∝ stake) and
UMA's DVM is **token-weighted** (1 UMA = 1 vote). Tellingly, even **Kleros's "Humanity
Court,"** which arbitrates *who is a unique human* (for Proof of Humanity), still
selects its **jurors by stake** — the registry is gated by personhood, the bench is
not. DemoThemis inverts this. Sources:
[Kleros Humanity Court](https://blog.kleros.io/complete-guide-to-staking-in-kleros-humanity-court/) ·
[Kleros whitepaper](https://kleros.io/assets/whitepaper.pdf).

**Honest scoping.** This reflects a single 2026-06-20 scan of the World App catalog
signal and both published grant waves — not an exhaustive crawl of all 150+ Mini Apps.
The category claim is therefore "none found in this scan," and the "first" claims are
scoped to "to our knowledge" + "in the World ecosystem," which the evidence supports.
We do **not** claim decentralized arbitration doesn't exist (Kleros and UMA do) — only
that no **personhood-gated** one does, and none in World.

---

## Differentiation paragraph (application-ready)

> Decentralized arbitration is a real, respected category — Kleros and UMA are live in
> production — but both decide by **capital**, and that is a one-time, knowable price:
> buy a majority of stake once and you don't just win this case, you own every future
> case for free — influence there is targetable, reusable, and amortizing. DemoThemis
> removes that surface at its root. Because the jury is gated by **personhood, not
> capital**, and the panel is drawn at random *after* the question from the whole
> verified-human pool, there is no known set of jurors to buy: to land a bribed majority
> on a specific case you would have to pre-corrupt a near-majority of the *entire* human
> pool and merely hope the draw seats enough of them — paying the full pool-corruption
> cost again, per case, for only a probability that shrinks as the pool, the case volume,
> and the value at stake grow. Cost-to-capture stops being a flat bribe and becomes
> pool-width × case-volume × value-at-stake. None of it is built on personhood — tellingly,
> even Kleros's "Humanity Court," which rules on *who is a unique human*, still selects its
> jurors **by stake**. Inside the World ecosystem the gap is starker: a June 2026 scan of
> the World App Mini App catalog and every World Community Grant recipient (Wave 0 and Wave
> 1) found **no dispute-resolution, arbitration, juror, or escrow project** — the closest
> funded work is one-human-one-vote *governance and voting* (Wonderland, Votexx, zkSnap,
> Agora, World Poll), which makes collective decisions, not two-party adjudications with
> bonds, evidence, and settlement. **DemoThemis inverts the decentralized-justice model —
> it uses proof-of-personhood, the primitive the World ecosystem is built on, as the juror
> gate itself** — so influence can no longer be bought once and reused: every case re-draws
> a fresh random panel, nothing carries to the next, and high-value cases fan out to several
> independent panels that must all agree (capture odds multiply pᴺ) with any captured panel
> appealed into a larger one. That makes it, to our knowledge, the first one-human-one-vote
> arbitration court and the first dispute-resolution app in World App, pairing on-chain World
> ID verification with bonded commit/reveal voting and atomic on-chain escrow settlement.

## One-line version (for the summary / pitch)

> The decentralized courts that exist (Kleros, UMA) pick jurors by **stake**, so a verdict
> has a price: buy a stake majority once and you decide every case after it for free. No
> World App or World-grant project does dispute resolution at all. DemoThemis gates the jury
> by **personhood instead of capital** and draws a fresh random panel after each question —
> so there's no set of jurors to buy and no influence to reuse: you'd have to re-corrupt much
> of the entire human pool, per case, for only a chance.

## Simulated in the sandbox only (clearly labeled)

The full dispute ladder, juror reputation (Wilson-interval gate), private invite rooms, and populations of simulated jurors. All generated data, badged as simulation. Every accepted case in the simulator uses the verified-human court path.

## Out of the MVP entirely

Governance (both tokens, voting, the constitutional firewall); the prediction market as a product (parimutuel pools, ERC-20 graduation, order books); per-draw face check; the justice-clock collusion audit; the reward-pool payout (the `RewardPool` **is** on-chain and accrues slashes + the 20% cut, but it is a passive sink — the Wilson-gated, recency-weighted cyclic distribution to active jurors is sandbox-only, funded-milestone #3); juror seniority gates; external audits.

## Funded-milestone roadmap (what the grant pays for, post-MVP)

1. drand/VRF draw randomness + mainnet deployment of the core court.
2. Receipt-free ballots (MACI-style, bonded coordinator v1) — hides juror addresses and votes.
3. Work-based quote engine + juror reputation + dispute ladder on-chain + the reward-pool gated cyclic payout (Wilson-gated, recency-weighted distribution to active jurors).
4. Resolution / oracle SDK + first prediction-market integration (escrow/marketplace a later consumer of the same SDK).
5. Security review. (No external audit is claimed anywhere in the MVP.)
6. Juror UX hardening + moderated user-testing — the final step and the roadmap's largest line; AI makes the build cheap, so the weight goes to getting real verified humans through the juror loop.

## Step 3 — sandbox build notes (appended as the simulation was built)

The `/sandbox` engine ports the reference math verbatim so its numbers match the pitch
site exactly. A few details where the simulation is narrower than the prose, or differs
from the on-chain core, are recorded here.

- **The appeal-bond "three floors" are two floors in the ported code.** The reference
  widget (`hybrid-juror-system.html` ~452-538) computes `bond = max(panelCost, capFloor)`
  where `panelCost = panel * FEE` (the juror-cost floor) and `capFloor = LAMBDA * odds *
  stake` (the anti-re-roll / capture floor). The surrounding prose names three floors
  (juror-cost, anti-re-roll, delay-rent), but the published JS has no delay-rent term. The
  sandbox ports the reference JS verbatim (two floors) so its bond figures match the pitch
  site; the delay-rent floor is described in copy as a roadmap refinement, not computed.
  Noted in `web/src/lib/sim/court-math.ts`.

- **Case-fee number differs by widget, by design.** The replacement core court charges a
  **20 MUSD** case fee, and the sandbox core-court walkthrough mirrors that (with the
  70/20/10 split, integer-cent math, slashes + dust → reward pool). The reference
  attack/ladder math uses **FEE = $1.50** (`hybrid-juror-system.html`), and the
  bribe-price floor is `fee($1.50) + bondAtRisk($5) + reputationValue($0)`. Each sandbox
  widget keeps its own source-of-truth number rather than forcing one: the core-court
  widget mirrors the replacement court (20 MUSD), while the attack/ladder widgets mirror the reference ($1.50).
  Both are labeled.

- **`reputationValue = $0` in the bribe-price floor.** The full design adds the present
  value of a juror's future reward-pool income to the cost of corrupting them. The MVP has
  no on-chain reward-pool payout, so that term is zero. Noted in
  `web/src/lib/sim/attack.ts`.

- **The token-court model is authored fresh** (no reference code exists for it):
  `P(flip) = 1` once `budget >= 0.5 * totalStake` at a chosen token price, plus a
  "second case free" reuse flag. The human-court side uses the ported combinatorics.

- **Everything in `/sandbox` is simulated.** Simulated juror populations, simulated
  per-juror accuracies, simulated cases. The route carries a fixed simulation badge and
  every widget carries a "simulated" tag. No sandbox number is presented as real usage.
  Every accepted case follows the verified-human court path. The seeded PRNG (mulberry32,
  fixed default seed) is for reproducibility of
  the curves and the "run 100 cases" sweep, not a randomness-security claim.

## Current production mapping — IDKit → `WorldIDRouter.verifyProof`

New mainnet deployments use `WorldIDRouterGate` with the documented World Chain
Router `0x17B354dD2595411ff79041f930e491A4Df39A278`, group id `1`, app id
`app_7bdfda4db4e2f59dd4a2427cd2bd860d`, and action `juror-registration`. The
World App requests `orbLegacy({ signal: wallet })` with `allow_legacy_proofs: true`.
The gate decodes `abi.encode(root, nullifierHash, uint256[8] proof)`, recomputes
`hashToField(wallet)` as the signal public input, and computes the external
nullifier from the app id and action. The Router verifies the proof on-chain and
the registry rejects a reused nullifier. The Router and all binding parameters are
immutable; there is no administrator-controlled verifier swap.

This compatibility path is the production baseline while the World ID 4.0
on-chain verifier is officially preview. When v4 becomes generally available,
adoption requires a separately deployed and audited gate/registry instance.

## Archived Step 3.5 experiment — World ID 4.0 preview verifier

This section preserves the historical experiment contract and encoding once shared by
the preview gate (`contracts/src/sybil/WorldIDGate.sol`) and the archived probe
(`web/src/app/verify-onchain/page.tsx`). It is **empirically
verified** (a live `cast call` to the World ID 4.0 Staging verifier
`0x703a6316c975DEabF30b637c155edD53e24657DB` on WC mainnet returned `0x` for a valid World
ID Simulator `proof_of_human` v4 staging proof and reverted `0x7fcdd1f4` for a forged one).

The deployed verifier signature (arg order is fixed by the contract):
`verify(uint256 nullifier, uint256 action, uint64 rpId, uint256 nonce, uint256 signalHash, uint64 expiresAtMin, uint64 issuerSchemaId, uint256 credentialGenesisIssuedAtMin, uint256[5] proof)`
— it **reverts** on a bad proof and returns nothing on success.

| `verify` arg | type | source in the IDKit v4 response | notes |
|---|---|---|---|
| `nullifier` | uint256 | `responses[0].nullifier` | RP-scoped per-human nullifier; the registry rejects reuse (the sybil gate). Identity-derived, **independent of the signal** — so the same human on two wallets shares it. |
| `action` | uint256 | **computed**, not from the response: `uint256(keccak256("juror-registration")) >> 8` | The top-level `response.action` is the action *string*. The `>> 8` hashToField shift is REQUIRED: the un-shifted keccak exceeds the BN254 field and reverts `PublicInputNotInField()` (`0xa54f8e27`). Value: `0x00d6f0d2ac0113e07a903cc011df10d5da49fbd368c0ecc3c8257c9bce73e3ed`. |
| `rpId` | uint64 | the `rp_id` string with `rp_` stripped | `rp_1ddcf8ba2efe3f36` → `0x1ddcf8ba2efe3f36`. |
| `nonce` | uint256 | top-level `result.nonce` | The request nonce, echoed back. |
| `signalHash` | uint256 | `responses[0].signal_hash` | = idkit-core `hashSignal(signal)`. For an address signal (`0x`+40 hex) it is `keccak256(20 raw bytes) >> 8`, **byte-identical** to the gate's on-chain `uint256(keccak256(abi.encodePacked(addr))) >> 8`. The gate recomputes it from the registering wallet and asserts equality — **binding the proof to the wallet**, so a stolen proof fails. |
| `expiresAtMin` | uint64 | `responses[0].expires_at_min` | |
| `issuerSchemaId` | uint64 | `responses[0].issuer_schema_id` | `1` = proof_of_human. |
| `credentialGenesisIssuedAtMin` | uint256 | `0` | Absent in the response; pass 0. |
| `proof` | uint256[5] | `responses[0].proof` | First 4 elements are the Groth16 limbs, the **5th is the Merkle root**. Corrupting limbs 0–3 reverts `0x7fcdd1f4`; corrupting the Merkle root reverts `InvalidMerkleRoot()` (`0x9dd854d3`). |

**The gate's `bytes proof`** is `abi.encode(nullifier, action, rpId, nonce, signalHash, expiresAtMin, issuerSchemaId, credentialGenesisIssuedAtMin, uint256[5] proof)` — the eight v4 scalars in declared order plus the fixed `uint256[5]`. This is a **fully static** 416-byte blob; the array MUST be encoded as `uint256[5]` (fixed), never a dynamic `uint256[]`. This encoding is **distinct from `MockSybilGate`'s** 2-tuple `abi.encode(uint256 nullifier, address signal)` (the cohort/test gate) — do not conflate the two.

**The archived IDKit probe** (`verify-onchain/page.tsx`) used the `proofOfHuman` preset with
`allow_legacy_proofs: false` and **`environment: 'staging'`** (REQUIRED — it defaults to
`'production'`, which the World ID Simulator rejects outright), and passed the registering
**wallet address** as the `signal`. The historical Step-5 instance changed to the
preview contract's `production` environment. That environment name did not make the
v4 verifier generally available, and the current replacement does not use it.

**What is NOT simulated here:** the historical mainnet WorldIDGate ran a real proof check.
The only Step-3.5 concession is the **Staging** verifier + World ID **Simulator** identities
(so the path is proven human-free for cents); they are real v4 proofs verified by the real
verifier contract, labeled as Simulator-sourced in `docs/DEMO.md`. This proves the
preview adapter's behavior only; production registration uses the Router mapping above.

## Step 5 legacy preview deployment and Router replacement

The legacy mainnet instance (chain 480) deploys the same five contracts against the
v4 **preview** World ID verifier
(`0x00000000009E00F9FE82CfeeBB4556686da094d7`, Orb/Device), with a 3-seat / minimum-3
court. It remains source-verified evidence for the Step-5 additions below, but its immutable
court lacks case-specific eligibility checks, a bounded first-draw unwind, and bounded quorum
recovery, so it must be replaced before the capstone. The replacement uses `WorldIDRouterGate`
over the documented mainnet Router, keeps the three-seat panel, uses a recommended
`MIN_POOL >= 4`, adds Permit2 re-bond, checks the eligible pool before accepting funds,
returns unused fees and escrow principal when the first draw times out, and allows an active
pool wider than three. See `docs/LIVENESS_RECOVERY.md`.

- **Permit2 bond deposit (the World App onboard path).** `JurorRegistry.registerWithPermit2`
  is added in Step 5: it runs the same one-human-one-seat enrolment as `register`, but pulls
  the 5 MUSD bond through canonical **Permit2** (`0x000000000022D473030F116dDEE9F6B43aC78BA3`,
  confirmed on WC mainnet) instead of a direct ERC-20 allowance. World App auto-revokes plain
  `approve(registry)` allowances but auto-approves tokens to Permit2, so the classic

  `Permit2.approve(bondToken, registry, BOND, 0)` then `registerWithPermit2(signal, proof)`,

  the World docs document for Mini Apps (`docs.world.org/mini-apps/commands/send-transaction`),
  not Permit2 SignatureTransfer — chosen because it is the documented, signature-placeholder-free
  path that the installed `@worldcoin/minikit-js` supports. The classic `register` (ERC-20
  allowance) remains for the desktop/dev/cohort path and the B5 page.

- **B5 — the `/app/dev` paste-a-proof page.** A dev-only (`NEXT_PUBLIC_SHOW_DEV`) desktop tool:
  paste a World ID Simulator completion JSON, and the server (`/api/dev-register`,
  `DEV_PRIVATE_KEY`) abi.encodes the gate proof for the active instance and runs faucet +
  classic approve + `register`. On the cohort it drives `MockSybilGate`; on mainnet the real
  `WorldIDGate`. It exists to exercise registration from a browser without World App; it is not
  a user-facing feature and is off in production.

- **Sponsored transactions — honest status.** World App sponsors gas for verified humans on
  whitelisted Mini App transactions; the onboard (register), commit, and reveal use
  `MiniKit.sendTransaction` against mainnet. This write path runs **only inside World App** and
  cannot be exercised in a desktop browser or CI, so it is **verified on-device at the human
  capstone**, not before. Until that trace exists the UI copy (GasBadge, dispute/case notes) is
  deliberately forward-looking and does not claim a specific sponsored tx has succeeded — the
  honesty rule applied to a deferred-until-on-device feature. The commit/reveal commitment binds
  `keccak256(abi.encode(vote, salt, caseId, juror))` to the voter's wallet (vote + salt persist
  to localStorage so reveal can replay them).

- **What stays simulated / labeled.** Everything in §"Simulated in the sandbox only" is
  unchanged. The Step-5 capstone cases (`web/public/cases/{q,escrow}-capstone.json`) are real
