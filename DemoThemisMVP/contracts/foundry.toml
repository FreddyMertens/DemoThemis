[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200

[fuzz]
runs = 256

[invariant]
runs = 64
depth = 24
fail_on_revert = false

[rpc_endpoints]
worldchain_sepolia = "https://worldchain-sepolia.g.alchemy.com/public"
worldchain_mainnet = "https://worldchain-mainnet.g.alchemy.com/public"

# Blockscout source verification for the Sepolia cohort.
[etherscan]
worldchain_sepolia = { key = "any", url = "https://worldchain-sepolia.explorer.alchemy.com/api", chain = 4801 }

[fmt]
line_length = 120
